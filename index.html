<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Home</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --y: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 85px; overflow-x: hidden; }
        
        /* স্লাইডার */
        .slider-container { width: 100%; height: 180px; overflow: hidden; position: relative; border-bottom: 2px solid #1a1a1a; }
        .slider-track { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slide { min-width: 100%; height: 100%; object-fit: cover; }

        /* স্ক্রলিং নোটিশ */
        #noticeBar { background: rgba(0, 255, 0, 0.1); color: var(--p); padding: 10px 0; border-bottom: 1px solid #222; overflow: hidden; }
        .marquee { white-space: nowrap; display: inline-block; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* ম্যাচ কার্ড */
        .match-card { background: var(--c); border-radius: 15px; margin: 15px; border: 1px solid #222; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .match-header { padding: 12px 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .match-mode { font-family: 'Orbitron'; font-size: 10px; color: var(--p); letter-spacing: 1px; }
        .match-body { padding: 15px; }
        .timer-box { background: rgba(255, 204, 0, 0.1); color: var(--y); padding: 8px; border-radius: 8px; text-align: center; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 15px; border: 1px solid rgba(255, 204, 0, 0.2); }

        .m-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .g-box { background: #000; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .g-label { font-size: 8px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        .g-val { font-size: 11px; font-weight: 700; color: #fff; }

        .slot-wrap { margin-top: 10px; }
        .s-bar { height: 6px; background: #222; border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .s-fill { height: 100%; background: var(--p); transition: 1s ease-in-out; box-shadow: 0 0 10px var(--p); }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border: none; font-size: 10px; transition: 0.3s; }
        .btn-rules { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-join { background: var(--p); color: #000; }
        .btn:active { transform: scale(0.95); }

        /* বটম নেভিগেশন */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }

        /* কাস্টম সুইট এলার্ট স্টাইল */
        .swal2-popup { background: #050505 !important; color: #fff !important; border: 1px solid #222 !important; }
        .swal2-input { background: #000 !important; color: #fff !important; border: 1px solid #333 !important; font-size: 14px !important; }
    </style>
</head>
<body>

    <div class="slider-container"><div class="slider-track" id="sliderTrack"></div></div>
    <div id="noticeBar"><div class="marquee" id="noticeMsg">Welcome to Tesla Esports...</div></div>
    <div id="matchList"></div>

    <div class="nav">
        <a href="index.html" class="n-i active"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();

        // স্লাইডার ও নোটিশ লোডার
        db.ref('settings/sliders').on('value', snap => {
            let h = ""; snap.forEach(c => { h += `<img src="${c.val()}" class="slide">`; });
            document.getElementById('sliderTrack').innerHTML = h || `<img src="https://via.placeholder.com/800x400?text=Tesla+Esports" class="slide">`;
            initSlider();
        });
        db.ref('settings/notice').on('value', snap => { document.getElementById('noticeMsg').innerText = snap.val() || ""; });

        // ম্যাচ লিস্ট লোডার
        db.ref('matches').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                const m = c.val();
                const total = parseInt(m.totalSlots) || 48, joined = parseInt(m.joinedCount) || 0, percent = (joined/total)*100;
                h += `
                <div class="match-card">
                    <div class="match-header"><span class="match-mode">${m.mode}</span><span>#${m.matchNo}</span></div>
                    <div class="match-body">
                        <div style="font-size:16px; font-weight:600; margin-bottom:12px;">${m.name}</div>
                        <div class="timer-box" data-time="${m.startTime}">Loading...</div>
                        <div class="m-grid">
                            <div class="g-box"><div class="g-label">Total Prize</div><div class="g-val">${m.totalPrize} TK</div></div>
                            <div class="g-box"><div class="g-label">Per Kill</div><div class="g-val">${m.perKill} TK</div></div>
                            <div class="g-box"><div class="g-label">Entry Fee</div><div class="g-val">${m.entryFee} TK</div></div>
                        </div>
                        <div class="slot-wrap"><div class="s-bar"><div class="s-fill" style="width:${percent}%"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#666;">
                            <span>Joined: ${joined}/${total}</span><span>Left: ${total-joined}</span>
                        </div></div>
                        <div class="btn-row">
                            <button class="btn btn-rules" onclick="showRules('${c.key}')">RULES</button>
                            <button class="btn btn-join" onclick="handleJoin('${c.key}', '${m.mode}', ${m.entryFee}, ${joined}, ${total})">${joined >= total ? 'FULL' : 'JOIN'}</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('matchList').innerHTML = h || "<p style='text-align:center;'>No Live Matches.</p>";
            startCountdowns();
        });

        // ডাইনামিক জয়েন লজিক (Solo/Duo/Squad/Clash/LoneWolf)
        async function handleJoin(id, mode, fee, joined, total) {
            const user = auth.currentUser;
            if(!user) return Swal.fire("Login Required", "Please login from Profile.", "warning");
            if(joined >= total) return Swal.fire("Match Full", "Registration is closed.", "error");

            // প্লেয়ার সংখ্যা নির্ধারণ (৭টি মোডের লজিক)
            let playerCount = 1;
            let mLow = mode.toLowerCase();
            if(mLow.includes('duo') || mLow.includes('2vs2')) playerCount = 2;
            else if(mLow.includes('squad') || mLow.includes('clash') || mLow.includes('4vs4')) playerCount = 4;

            let inputsHtml = `<p style="color:#aaa; font-size:11px; margin-bottom:15px;">Input details for all ${playerCount} players</p>`;
            for(let i=1; i<=playerCount; i++) {
                inputsHtml += `
                <div style="margin-bottom:12px; border:1px solid #222; padding:10px; border-radius:10px; text-align:left;">
                    <span style="color:var(--p); font-size:10px; font-weight:bold;">PLAYER ${i}</span>
                    <input id="pName${i}" class="swal2-input" placeholder="In-game Name">
                    <input id="pUid${i}" class="swal2-input" placeholder="Game UID (Player ${i})">
                </div>`;
            }

            const { value: playersData } = await Swal.fire({
                title: `<span style="font-family:Orbitron; font-size:16px;">${mode} JOIN</span>`,
                html: `<div style="max-height:350px; overflow-y:auto;">${inputsHtml}</div>`,
                showCancelButton: true,
                confirmButtonText: 'CONFIRM JOIN',
                confirmButtonColor: '#00ff00',
                preConfirm: () => {
                    let data = [];
                    for(let i=1; i<=playerCount; i++) {
                        let n = document.getElementById(`pName${i}`).value;
                        let u = document.getElementById(`pUid${i}`).value;
                        if(!n || !u) { Swal.showValidationMessage(`Fill Info for Player ${i}`); return false; }
                        data.push({ name: n, gameUid: u });
                    }
                    return data;
                }
            });

            if (playersData) {
                db.ref('users/' + user.uid).once('value', async s => {
                    const u = s.val() || {};
                    if((u.deposit || 0) < fee) return Swal.fire("Low Balance", "Add money to join.", "error");
                    
                    await db.ref('users/' + user.uid).update({ deposit: (u.deposit || 0) - fee });
                    await db.ref('matches/' + id).update({ joinedCount: joined + 1 });
                    
                    db.ref('match_joins/' + id + '/' + user.uid).set({
                        mainUid: user.uid,
                        players: playersData,
                        time: Date.now()
                    });
                    db.ref('user_matches/' + user.uid + '/' + id).set(true);
                    
                    Swal.fire("Joined Successfully!", "Match added to 'My Match' page.", "success");
                });
            }
        }

        function showRules(id) {
            db.ref('matches/'+id+'/rules').once('value', s => {
                Swal.fire({ title: 'Rules', text: s.val() || "Rules not set.", icon: 'info' });
            });
        }

        function initSlider() {
            let i = 0; const t = document.getElementById('sliderTrack');
            setInterval(() => {
                const s = document.querySelectorAll('.slide');
                if(s.length > 1) { i = (i + 1) % s.length; t.style.transform = `translateX(-${i * 100}%)`; }
            }, 5000);
        }

        function startCountdowns() {
            setInterval(() => {
                document.querySelectorAll('.timer-box').forEach(el => {
                    const diff = new Date(el.getAttribute('data-time')).getTime() - new Date().getTime();
                    if(diff < 0) { el.innerHTML = "<span style='color:var(--p)'>LIVE</span>"; return; }
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    el.innerHTML = `Starts in: ${h}h ${m}m ${s}s`;
                });
            }, 1000);
        }
    </script>
</body>
</html>
