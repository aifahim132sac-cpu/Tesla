<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Play</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 85px; }
        
        .slider-container { width: 100%; height: 190px; overflow: hidden; position: relative; }
        .slider-track { display: flex; transition: transform 0.5s ease; height: 100%; }
        .slide { min-width: 100%; height: 100%; object-fit: cover; }
        #noticeBar { background: rgba(0, 255, 0, 0.08); color: var(--p); padding: 12px; font-size: 13px; display: none; border-bottom: 1px solid #222; }
        .marquee { overflow: hidden; white-space: nowrap; }
        .marquee p { display: inline-block; padding-left: 100%; animation: marquee 10s linear infinite; margin: 0; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

        .match-card { background: var(--c); border-radius: 12px; margin: 15px; border: 1px solid #222; overflow: hidden; }
        .match-header { padding: 12px 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .match-mode { font-family: 'Orbitron'; font-size: 10px; color: var(--p); }
        .match-body { padding: 15px; }
        .timer-box { background: rgba(255, 204, 0, 0.1); color: #ffcc00; padding: 7px; border-radius: 6px; text-align: center; font-family: 'Orbitron'; font-size: 11px; margin-bottom: 15px; border: 1px solid rgba(255, 204, 0, 0.2); }

        .m-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .g-box { background: #000; padding: 10px 5px; border-radius: 8px; text-align: center; border: 1px solid #222; }
        .g-label { font-size: 8px; color: #777; text-transform: uppercase; margin-bottom: 3px; }
        .g-val { font-size: 11px; font-weight: 600; }

        .slot-wrap { margin-top: 10px; }
        .s-bar { height: 6px; background: #222; border-radius: 10px; overflow: hidden; }
        .s-fill { height: 100%; background: var(--p); width: 0%; transition: 0.8s; box-shadow: 0 0 10px var(--p); }

        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; border: none; font-size: 11px; }
        .btn-rules { background: #222; color: #fff; border: 1px solid #333; }
        .btn-join { background: var(--p); color: #000; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="slider-container"><div class="slider-track" id="sliderTrack"></div></div>
    <div id="noticeBar"><div class="marquee"><p id="noticeMsg"></p></div></div>
    <div id="matchList">Loading...</div>

    <div class="nav">
        <a href="index.html" class="n-i active"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();

        // স্লাইডার
        db.ref('settings/sliders').on('value', snap => {
            let h = ""; snap.forEach(c => { h += `<img src="${c.val()}" class="slide">`; });
            document.getElementById('sliderTrack').innerHTML = h || `<img src="https://via.placeholder.com/800x400?text=Tesla+Esports" class="slide">`;
            initSlider();
        });

        // নোটিশ
        db.ref('settings/notice').on('value', snap => {
            const m = snap.val();
            document.getElementById('noticeBar').style.display = m ? "block" : "none";
            document.getElementById('noticeMsg').innerText = m || "";
        });

        // ম্যাচ লিস্ট
        db.ref('matches').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                const m = c.val();
                const total = m.totalSlots || 48, joined = m.joinedCount || 0, percent = (joined/total)*100;
                h += `
                <div class="match-card">
                    <div class="match-header"><span class="match-mode">${m.mode}</span><span>#${m.matchNo}</span></div>
                    <div class="match-body">
                        <div style="font-size:17px; font-weight:600; margin-bottom:12px;">${m.name}</div>
                        <div class="timer-box" data-time="${m.startTime}">Loading...</div>
                        <div class="m-grid">
                            <div class="g-box"><div class="g-label">Prize</div><div class="g-val">${m.totalPrize} TK</div></div>
                            <div class="g-box"><div class="g-label">Per Kill</div><div class="g-val">${m.perKill} TK</div></div>
                            <div class="g-box"><div class="g-label">Entry</div><div class="g-val">${m.entryFee} TK</div></div>
                        </div>
                        <div class="slot-wrap"><div class="s-bar"><div class="s-fill" style="width:${percent}%"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:10px; margin-top:8px; color:#666;">
                            <span>Joined: ${joined}/${total}</span><span>Left: ${total-joined}</span>
                        </div></div>
                        <div class="btn-row">
                            <button class="btn btn-rules" onclick="showRules('${c.key}')">RULES</button>
                            <button class="btn btn-join" onclick="handleJoin('${c.key}', '${m.mode}', ${m.entryFee}, ${joined}, ${total})">JOIN NOW</button>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('matchList').innerHTML = h || "<p style='text-align:center;'>No Matches.</p>";
            startCountdowns();
        });

        async function handleJoin(id, mode, fee, joined, total) {
            const user = auth.currentUser;
            if(!user) return Swal.fire("Login Needed", "Please go to Profile and Login first.", "warning");
            if(joined >= total) return Swal.fire("Full!", "Match is already full.", "error");

            let boxCount = 1;
            let mLow = mode.toLowerCase();
            if(mLow.includes('duo')) boxCount = 2;
            else if(mLow.includes('squad')) boxCount = 4;

            let inputsHtml = "";
            for(let i=1; i<=boxCount; i++) {
                inputsHtml += `<input id="gameUid${i}" class="swal2-input" placeholder="Player ${i} Game UID">`;
            }

            const { value: gameUids } = await Swal.fire({
                title: `${mode} Join`,
                html: inputsHtml,
                showCancelButton: true,
                preConfirm: () => {
                    let uids = [];
                    for(let i=1; i<=boxCount; i++) {
                        let val = document.getElementById(`gameUid${i}`).value;
                        if(!val) { Swal.showValidationMessage(`UID required for Player ${i}`); return false; }
                        uids.push(val);
                    }
                    return uids;
                }
            });

            if (gameUids) {
                db.ref('users/' + user.uid).once('value', s => {
                    const u = s.val() || {};
                    const bal = u.deposit || 0;
                    if(bal < fee) return Swal.fire("Low Balance", "Add money in profile.", "error");
                    
                    db.ref('users/' + user.uid).update({ deposit: bal - fee });
                    db.ref('matches/' + id).update({ joinedCount: joined + 1 });
                    db.ref('match_joins/' + id).push({ uid: user.uid, gameUids: gameUids });
                    db.ref('user_matches/' + user.uid + '/' + id).set(true);
                    Swal.fire("Success", "Joined!", "success");
                });
            }
        }

        function showRules(id) {
            db.ref('matches/'+id+'/rules').once('value', s => {
                Swal.fire('Rules', s.val() || "Rules not set.", 'info');
            });
        }

        function initSlider() {
            let i = 0; const t = document.getElementById('sliderTrack');
            setInterval(() => {
                const s = document.querySelectorAll('.slide');
                if(s.length > 1) { i = (i + 1) % s.length; t.style.transform = `translateX(-${i * 100}%)`; }
            }, 5000);
        }

        function startCountdowns() {
            setInterval(() => {
                document.querySelectorAll('.timer-box').forEach(el => {
                    const diff = new Date(el.getAttribute('data-time')).getTime() - new Date().getTime();
                    if(diff < 0) { el.innerHTML = "STARTED"; return; }
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    el.innerHTML = `Starts in: ${h}h ${m}m ${s}s`;
                });
            }, 1000);
        }
    </script>
</body>
</html>
