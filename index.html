<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 85px; }
        
        .header { background: var(--c); padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .header h1 { font-family: 'Orbitron'; font-size: 18px; color: var(--p); margin: 0; }

        .result-card { background: var(--c); margin: 15px; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .res-head { background: #1a1a1a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .res-title { font-size: 14px; font-weight: 600; color: #fff; }
        .res-mode { font-size: 10px; color: var(--p); font-family: 'Orbitron'; }

        .res-table { width: 100%; border-collapse: collapse; }
        .res-table th { background: #000; color: #777; font-size: 10px; text-transform: uppercase; padding: 10px; text-align: left; }
        .res-table td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #1a1a1a; }
        
        .p-name { color: #fff; font-weight: 500; }
        .p-kill { color: #ffcc00; text-align: center; }
        .p-win { color: var(--p); text-align: right; font-weight: 600; }

        /* Group Style for Duo/Squad */
        .group-row { background: rgba(0, 255, 0, 0.03); border-left: 3px solid var(--p); }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header"><h1>MATCH RESULTS</h1></div>

    <div id="resultsList">
        <p style="text-align:center; margin-top:50px; color:#444;">রেজাল্ট লোড হচ্ছে...</p>
    </div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i active"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // রেজাল্ট ডাটা ফেচিং
        db.ref('results').on('value', snap => {
            let html = "";
            if(!snap.exists()){
                document.getElementById('resultsList').innerHTML = "<p style='text-align:center; padding:20px;'>কোনো রেজাল্ট পাওয়া যায়নি।</p>";
                return;
            }

            snap.forEach(match => {
                const m = match.val();
                html += `
                <div class="result-card">
                    <div class="res-head">
                        <span class="res-title">${m.matchName} (#${m.matchNo})</span>
                        <span class="res-mode">${m.mode}</span>
                    </div>
                    <table class="res-table">
                        <thead>
                            <tr>
                                <th>Player Name</th>
                                <th style="text-align:center;">Kills</th>
                                <th style="text-align:right;">Winning</th>
                            </tr>
                        </thead>
                        <tbody>`;

                // প্লেয়ার লিস্ট (Grouped by Admin Input)
                if(m.players) {
                    Object.values(m.players).forEach(player => {
                        // যদি Duo বা Squad হয়, তবে গ্রুপ হিসেবে দেখানোর জন্য ক্লাস যোগ হবে
                        const groupClass = (m.mode.toLowerCase().includes('solo')) ? "" : "group-row";
                        html += `
                        <tr class="${groupClass}">
                            <td class="p-name">${player.name}</td>
                            <td class="p-kill">${player.kills}</td>
                            <td class="p-win">${player.winTk} TK</td>
                        </tr>`;
                    });
                }

                html += `</tbody></table></div>`;
            });
            document.getElementById('resultsList').innerHTML = html;
        });
    </script>
</body>
</html>
