<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Home</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --p: #00ff00; 
            --b: #050505; 
            --c: #111; 
            --y: #ffcc00; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--b); 
            color: #fff; 
            margin: 0; 
            padding-bottom: 85px; 
            overflow-x: hidden; 
        }

        /* -------------------------------------------
           MODAL & OVERLAY STYLES
        ------------------------------------------- */
        #authModal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content { 
            background: #111; 
            width: 88%; 
            max-width: 360px; 
            padding: 35px 20px; 
            border-radius: 20px; 
            border: 1px solid #222; 
            position: relative; 
            text-align: center; 
        }

        .close-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 26px; 
            color: #555; 
            cursor: pointer; 
        }

        .m-title { 
            font-family: 'Orbitron'; 
            color: var(--p); 
            margin-bottom: 25px; 
            font-size: 18px; 
        }

        /* -------------------------------------------
           HEADER & NAVIGATION STYLES
        ------------------------------------------- */
        .header { 
            background: #000; 
            padding: 20px 0; 
            border-bottom: 1px solid #1a1a1a; 
            text-align: center; 
        }

        .header h2 { 
            font-family: 'Orbitron'; 
            color: var(--p); 
            margin: 0; 
            font-size: 22px; 
            letter-spacing: 3px; 
        }

        .nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: #000; 
            display: flex; 
            padding: 14px 0; 
            border-top: 1px solid #1a1a1a; 
            z-index: 1000; 
        }

        .n-i { 
            flex: 1; 
            text-align: center; 
            color: #555; 
            font-size: 10px; 
            text-decoration: none; 
        }

        .n-i.active { 
            color: var(--p); 
        }

        .n-i i { 
            font-size: 22px; 
            display: block; 
            margin-bottom: 5px; 
        }

        /* -------------------------------------------
           MATCH CARD & ROOM DETAILS STYLES
        ------------------------------------------- */
        .match-card { 
            background: var(--c); 
            border-radius: 18px; 
            margin: 15px; 
            border: 1px solid #222; 
            overflow: hidden; 
        }

        .match-header { 
            padding: 12px 15px; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .match-mode { 
            font-family: 'Orbitron'; 
            font-size: 11px; 
            color: var(--p); 
        }

        .timer-box { 
            background: rgba(255, 204, 0, 0.07); 
            color: var(--y); 
            padding: 10px; 
            border-radius: 10px; 
            text-align: center; 
            font-family: 'Orbitron'; 
            font-size: 12px; 
            margin-bottom: 15px; 
        }

        /* Room ID Section Style */
        .room-box { 
            background: rgba(0, 255, 0, 0.08); 
            border: 1px dashed var(--p); 
            border-radius: 12px; 
            padding: 12px; 
            margin: 15px; 
            display: none; 
            text-align: center; 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .room-title { 
            font-family: 'Orbitron'; 
            font-size: 11px; 
            color: var(--p); 
            margin-bottom: 8px; 
            display: block; 
            letter-spacing: 1px;
        }

        .room-info { 
            font-size: 14px; 
            font-weight: bold; 
            color: #fff; 
            margin: 5px 0; 
            font-family: 'Orbitron'; 
        }

        /* -------------------------------------------
           PROGRESS BAR & GRID STYLES
        ------------------------------------------- */
        .slot-wrap { 
            margin-top: 15px; 
            background: #0a0a0a; 
            padding: 10px; 
            border-radius: 12px; 
        }

        .s-bar { 
            height: 8px; 
            background: #222; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-bottom: 8px; 
        }

        .s-fill { 
            height: 100%; 
            background: var(--p); 
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 0%;
        }

        .m-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .g-box { 
            background: #000; 
            padding: 12px 5px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #222; 
        }

        .g-label { 
            font-size: 9px; 
            color: #777; 
            text-transform: uppercase; 
        }

        .g-val { 
            font-size: 12px; 
            font-weight: 700; 
            color: #fff; 
            font-family: 'Orbitron'; 
        }

        /* Slider and Other Component Styles */
        .slider-container { 
            width: 92%; 
            height: 160px; 
            overflow: hidden; 
            position: relative; 
            border-radius: 15px; 
            margin: 15px auto; 
            border: 1px solid #222; 
        }

        .slider-track { 
            display: flex; 
            transition: transform 0.5s ease; 
            height: 100%; 
        }

        .slide { 
            min-width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        #noticeBar { 
            background: rgba(0, 255, 0, 0.05); 
            color: var(--p); 
            padding: 12px 0; 
            border-top: 1px solid #1a1a1a; 
            border-bottom: 1px solid #1a1a1a; 
            overflow: hidden; 
        }

        .marquee { 
            white-space: nowrap; 
            display: inline-block; 
            animation: marquee 15s linear infinite; 
            font-size: 13px; 
        }

        @keyframes marquee { 
            0% { transform: translateX(100vw); } 
            100% { transform: translateX(-100%); } 
        }

        .btn-row { 
            display: flex; 
            gap: 12px; 
            margin-top: 15px; 
        }

        .btn { 
            flex: 1; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: bold; 
            font-family: 'Orbitron'; 
            cursor: pointer; 
            border: none; 
            font-size: 11px; 
            transition: 0.3s;
        }

        .btn-rules { background: #1a1a1a; color: #fff; }
        .btn-join { background: var(--p); color: #000; }

        /* Auth Inputs */
        .auth-input { 
            width: 100%; 
            padding: 14px; 
            margin: 8px 0; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 10px; 
            box-sizing: border-box; 
            outline: none; 
        }

        /* Blocking Layer */
        #blockLayer { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
        }

        /* Custom Swal Inputs */
        .join-input-box { 
            text-align: left; 
            margin-bottom: 15px; 
            border: 1px solid #333; 
            padding: 12px; 
            border-radius: 10px; 
            background: #000; 
        }

        .join-input-box label { 
            color: var(--p); 
            font-size: 10px; 
            font-family: 'Orbitron'; 
            display: block; 
            margin-bottom: 5px; 
        }

        .swal-custom-input { 
            width: 100% !important; 
            margin: 0 !important; 
            background: transparent !important; 
            border: none !important; 
            color: #fff !important; 
            font-size: 14px !important; 
            padding: 5px 0 !important; 
            outline: none !important; 
        }
    </style>
</head>
<body>

    <div id="blockLayer">
        <div>
            <i class="fas fa-user-slash" style="font-size: 60px; color: #ff3e3e; margin-bottom: 20px;"></i>
            <h2 style="font-family: 'Orbitron';">ACCOUNT BLOCKED</h2>
            <p id="blockMsg" style="color: #aaa;"></p>
        </div>
    </div>

    <div class="header">
        <h2>TESLA ESPORTS</h2>
    </div>

    <div class="slider-container">
        <div class="slider-track" id="sliderTrack"></div>
    </div>

    <div id="noticeBar">
        <div class="marquee" id="noticeMsg">Loading Notice... Please Wait</div>
    </div>
    
    <div id="matchList"></div>

    <div class="nav">
        <a href="index.html" class="n-i active">
            <i class="fas fa-gamepad"></i>Play
        </a>
        <a href="result.html" class="n-i">
            <i class="fas fa-poll"></i>Result
        </a>
        <a href="mymatch.html" class="n-i">
            <i class="fas fa-trophy"></i>My Match
        </a>
        <a href="profile.html" class="n-i">
            <i class="fas fa-user-circle"></i>Profile
        </a>
    </div>

    <script>
        /* FIREBASE INITIALIZATION */
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        /* AUTHENTICATION WATCHER */
        auth.onAuthStateChanged(user => {
            if (user) {
                const statusRef = db.ref('users/' + user.uid + '/isOnline');
                statusRef.set(true);
                statusRef.onDisconnect().set(false);

                db.ref('users/' + user.uid).on('value', snapshot => {
                    const userData = snapshot.val();
                    if (userData && userData.isBlocked) {
                        document.getElementById('blockLayer').style.display = 'flex';
                        document.getElementById('blockMsg').innerText = `আপনার অ্যাকাউন্টটি ব্লক করা হয়েছে। অ্যাডমিনের সাথে যোগাযোগ করুন।`;
                    } else {
                        document.getElementById('blockLayer').style.display = 'none';
                    }
                });
            }
        });

        /* FETCH SETTINGS: NOTICE & SLIDER */
        db.ref('settings/notice').on('value', snap => { 
            document.getElementById('noticeMsg').innerText = snap.val() || "Welcome to Tesla Esports!"; 
        });
        
        db.ref('settings/sliders').on('value', snap => {
            let sliderHtml = ""; 
            snap.forEach(child => { 
                const data = child.val();
                const link = data.link || "";
                sliderHtml += `<img src="${data.image}" class="slide" onclick="${link ? `window.location.href='${link}'` : ''}" style="${link ? 'cursor:pointer;' : ''}">`;
            });
            document.getElementById('sliderTrack').innerHTML = sliderHtml;
            initSlider();
        });

        /* CORE LOGIC: MATCH LISTING & REAL-TIME UPDATES */
        db.ref('matches').on('value', snap => {
            let matchHtml = "";
            const currentUid = auth.currentUser ? auth.currentUser.uid : null;
            
            snap.forEach(child => {
                const m = child.val();
                const mKey = child.key;
                const maxSlot = parseInt(m.mSlot) || 48;
                const matchNumber = m.matchNo;

                matchHtml += `
                <div class="match-card">
                    <div class="match-header">
                        <span class="match-mode">${m.mType || 'SOLO'}</span>
                        <span>#${matchNumber}</span>
                    </div>
                    <div style="padding:15px;">
                        <div style="font-size:16px; font-weight:600; margin-bottom:12px;">${m.title}</div>
                        <div class="timer-box" data-time="${m.mTimeSelect}">Loading Timer...</div>
                        
                        <div class="m-grid">
                            <div class="g-box"><div class="g-label">Prize</div><div class="g-val">${m.mPrize || 0}</div></div>
                            <div class="g-box"><div class="g-label">Per Kill</div><div class="g-val">${m.mPk || 0}</div></div>
                            <div class="g-box"><div class="g-label">Entry Fee</div><div class="g-val">${m.mFee || 0}</div></div>
                        </div>

                        <div class="slot-wrap">
                            <div class="s-bar"><div id="bar-${mKey}" class="s-fill"></div></div>
                            <div style="display:flex; justify-content:space-between; font-size:11px; color:#aaa;">
                                <span id="count-${mKey}">Joined: 0/${maxSlot}</span>
                                <span id="left-${mKey}">Left: ${maxSlot}</span>
                            </div>
                        </div>

                        <div id="room-${mKey}" class="room-box">
                            <span class="room-title"><i class="fas fa-lock"></i> ROOM DETAILS</span>
                            <div class="room-info" id="rid-${mKey}">ID: Wait...</div>
                            <div class="room-info" id="rps-${mKey}">PASS: Wait...</div>
                        </div>

                        <div class="btn-row">
                            <button class="btn btn-rules" onclick="showRules('${mKey}')">RULES</button>
                            <button id="btn-${mKey}" class="btn btn-join" onclick="handleJoin('${mKey}', '${m.mType}', ${m.mFee}, ${maxSlot}, '${matchNumber}')">JOIN MATCH</button>
                        </div>
                    </div>
                </div>`;

                // REAL-TIME SLOT & JOIN STATUS LISTENER (FIXED FOR ADMIN KICK)
                db.ref('joinedPlayers/' + matchNumber).on('value', joinedSnap => {
                    const currentJoined = joinedSnap.numChildren();
                    const fillPercentage = (currentJoined / maxSlot) * 100;
                    
                    if(document.getElementById(`bar-${mKey}`)) {
                        document.getElementById(`bar-${mKey}`).style.width = fillPercentage + "%";
                        document.getElementById(`count-${mKey}`).innerText = `Joined: ${currentJoined}/${maxSlot}`;
                        document.getElementById(`left-${mKey}`).innerText = `Left: ${maxSlot - currentJoined}`;
                        
                        // Check if current user is still in the list (Real-time sync)
                        if(currentUid) {
                            const isPlayerJoined = joinedSnap.hasChild(currentUid);
                            const jBtn = document.getElementById(`btn-${mKey}`);
                            const rBox = document.getElementById(`room-${mKey}`);

                            if(isPlayerJoined) {
                                jBtn.innerText = "ALREADY JOINED";
                                jBtn.style.background = "#333";
                                jBtn.style.color = "#fff";
                                jBtn.onclick = null;
                                rBox.style.display = "block";
                                
                                if(m.roomId && m.roomPass) {
                                    document.getElementById(`rid-${mKey}`).innerText = "ID: " + m.roomId;
                                    document.getElementById(`rps-${mKey}`).innerText = "PASS: " + m.roomPass;
                                } else {
                                    document.getElementById(`rid-${mKey}`).innerText = "ID: Waiting...";
                                    document.getElementById(`rps-${mKey}`).innerHTML = "<span style='font-size:10px; color:var(--y);'>ম্যাচ শুরুর ১৫ মিনিট আগে দেওয়া হবে।</span>";
                                }
                            } else {
                                // If not joined or kicked by admin, restore button
                                jBtn.innerText = "JOIN MATCH";
                                jBtn.style.background = "var(--p)";
                                jBtn.style.color = "#000";
                                jBtn.onclick = () => handleJoin(mKey, m.mType, m.mFee, maxSlot, matchNumber);
                                rBox.style.display = "none";
                            }
                        }
                    }
                });
            });
            document.getElementById('matchList').innerHTML = matchHtml || "<p style='text-align:center; padding:20px;'>No Active Matches.</p>";
            startCountdowns();
        });

        /* FUNCTION: MATCH JOINING FLOW */
        async function handleJoin(id, mode, fee, total, matchNo) {
            if(!auth.currentUser) return window.location.href = "auth.html";
            const uid = auth.currentUser.uid;
            
            const currentPlayers = await db.ref('joinedPlayers/' + matchNo).once('value');
            if(currentPlayers.numChildren() >= total) return Swal.fire("Match Full!", "স্লট শেষ হয়ে গেছে!", "error");
            
            let playerCount = 1; 
            const mLow = mode ? mode.toLowerCase() : "";
            if(mLow.includes('duo')) playerCount = 2; 
            else if(mLow.includes('squad')) playerCount = 4;
            
            let formHtml = `<p style="color:#aaa; font-size:12px; margin-bottom:20px;">গেমের সঠিক তথ্য দিন।</p><div style="max-height: 350px; overflow-y: auto;">`; 
            for(let i=1; i<=playerCount; i++) {
                formHtml += `
                <div style="margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                    <h4 style="color:var(--p); font-size:12px; font-family:'Orbitron'; margin:0 0 10px 0;">PLAYER ${i}</h4>
                    <div class="join-input-box"><label>IN-GAME NAME</label><input id="pName${i}" class="swal-custom-input" placeholder="Ex: Tesla"></div>
                    <div class="join-input-box"><label>GAME UID</label><input id="pId${i}" class="swal-custom-input" placeholder="Ex: 1234567"></div>
                    <div class="join-input-box"><label>PROFILE UID</label><input id="pFullUid${i}" class="swal-custom-input" placeholder="Paste Profile UID"></div>
                </div>`;
            }
            formHtml += `</div>`;

            const { value: pData } = await Swal.fire({
                title: 'JOIN MATCH', 
                html: formHtml, 
                confirmButtonText: 'CONFIRM JOIN', 
                showCancelButton: true, 
                confirmButtonColor: '#00ff00', 
                background: '#111', 
                color: '#fff', 
                width: '95%',
                preConfirm: () => {
                    let players = [];
                    for(let i=1; i<=playerCount; i++) {
                        let n = document.getElementById(`pName${i}`).value;
                        let g = document.getElementById(`pId${i}`).value;
                        let f = document.getElementById(`pFullUid${i}`).value;
                        if(!n || !g || !f) { Swal.showValidationMessage(`সব তথ্য পূরণ করুন`); return false; }
                        players.push({ name: n, gameId: g, profileUid: f });
                    }
                    return players;
                }
            });

            if(pData) {
                db.ref('users/' + uid).once('value', async s => {
                    const u = s.val() || {};
                    const bal = (parseFloat(u.balance) || 0) + (parseFloat(u.winning) || 0);
                    if(bal < fee) return Swal.fire("Low Balance!", "টাকা নেই!", "error");
                    
                    let nB = parseFloat(u.balance), nW = parseFloat(u.winning);
                    if(nB >= fee) nB -= fee; else { nW -= (fee - nB); nB = 0; }

                    Swal.fire({title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

                    try {
                        await db.ref('users/' + uid).update({ balance: nB, winning: nW, played: (parseInt(u.played) || 0) + 1 });
                        await db.ref('users/' + uid + '/joinedMatches/' + id).set(true);
                        await db.ref('matches/' + id + '/joined_players/' + uid).set(true);
                        await db.ref('joinedPlayers/' + matchNo + '/' + uid).set({
                            playerName: pData[0].name, team: pData, appUid: uid, matchNo: matchNo, joinedAt: new Date().toLocaleString()
                        });
                        Swal.fire("Success!", "জয়েন করা সফল হয়েছে।", "success");
                    } catch (e) { Swal.fire("Error!", e.message, "error"); }
                });
            }
        }

        /* UTILITY: RULES, SLIDER, COUNTDOWN */
        function showRules(id) { 
            db.ref('matches/'+id+'/mRules').once('value', s => { 
                Swal.fire({title: 'Match Rules', html: s.val() || "No Rules.", icon: 'info', background: '#111', color: '#fff'}); 
            }); 
        }

        function initSlider() { 
            let idx = 0; 
            setInterval(() => { 
                const slides = document.querySelectorAll('.slide'); 
                if(slides.length > 1) { 
                    idx = (idx + 1) % slides.length; 
                    document.getElementById('sliderTrack').style.transform = `translateX(-${idx * 100}%)`; 
                } 
            }, 5000); 
        }

        function startCountdowns() { 
            setInterval(() => { 
                document.querySelectorAll('.timer-box').forEach(el => { 
                    const t = el.getAttribute('data-time'); 
                    if(!t) return; 
                    const diff = new Date(t).getTime() - new Date().getTime(); 
                    if(diff < 0) { el.innerHTML = "LIVE"; el.style.color = "#00ff00"; return; } 
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000); 
                    el.innerHTML = `Starts in: ${h}h ${m}m ${s}s`; 
                }); 
            }, 1000); 
        }
    </script>
</body>
</html>
