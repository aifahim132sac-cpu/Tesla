<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Final Full Code</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --red: #ff3333; --gold: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; }
        
        .header { padding: 15px; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); margin: 0; font-size: 18px; }
        .bell-icon { position: absolute; left: 15px; color: var(--p); font-size: 20px; }

        .sec { display: none; padding: 15px; }
        .sec.active { display: block; }

        /* Match Card UI */
        .card { background: var(--c); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        .m-no { color: var(--p); font-family: 'Orbitron'; font-size: 16px; }
        .m-mode { position: absolute; right: 15px; top: 15px; border: 1px solid #00ffff; color: #00ffff; font-size: 10px; padding: 2px 8px; border-radius: 5px; }
        
        .timer-box { background: rgba(255, 51, 51, 0.1); border: 1px solid var(--red); color: var(--red); padding: 8px; border-radius: 10px; text-align: center; font-weight: bold; margin: 12px 0; font-size: 13px; }
        .timer-box.upcoming { border-color: var(--gold); color: var(--gold); background: rgba(255, 204, 0, 0.1); }

        /* Slots Grid */
        .slot-row { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 5px; }
        .slot-bar { height: 6px; background: #222; border-radius: 3px; margin: 8px 0; overflow: hidden; }
        .slot-fill { height: 100%; background: var(--p); width: 0%; transition: 0.5s; }

        /* Prize Info Grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 15px 0; }
        .i-item { background: #1a1a1a; padding: 10px 5px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .i-item span { display: block; font-size: 9px; color: #666; text-transform: uppercase; }
        .i-item b { color: var(--p); font-size: 12px; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .white-btn { flex: 1; padding: 10px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .join-btn { width: 100%; padding: 12px; background: transparent; color: var(--p); border: 1px solid var(--p); border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; }
        .join-btn.joined { background: var(--p); color: #000; }

        /* Result Table UI */
        .res-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 12px; }
        .res-table th { background: #222; color: var(--p); padding: 8px; text-align: left; }
        .res-table td { padding: 8px; border-bottom: 1px solid #222; }

        /* Nav */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-bell bell-icon"></i>
        <h2 class="title">TESLA ESPORTS</h2>
    </div>

    <div id="play" class="sec active"><div id="mList">Loading Matches...</div></div>
    
    <div id="result" class="sec"><div id="rList">Loading Results...</div></div>

    <div id="myMatch" class="sec"><div id="myMList">No Matches Joined.</div></div>

    <div id="profile" class="sec">
        <div class="card" style="text-align:center;">
            <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <h2 id="uName" style="margin:0; font-family:'Orbitron';">PLAYER</h2>
                <i class="fas fa-edit" style="color:var(--p); cursor:pointer;" onclick="editProfile()"></i>
            </div>
            <div class="info-grid" style="margin-top:20px;">
                <div class="i-item"><span>Main Bal</span><b id="mBal">0 TK</b></div>
                <div class="i-item"><span>Played</span><b id="mPlayed">0</b></div>
                <div class="i-item"><span>Deposit</span><b id="dBal">0 TK</b></div>
            </div>
            <button class="join-btn" onclick="auth.signOut()" style="border-color:var(--red); color:var(--red);">Logout</button>
        </div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('play', this)"><i class="fas fa-gamepad"></i>Play</div>
        <div class="n-i" onclick="nav('result', this)"><i class="fas fa-poll"></i>Result</div>
        <div class="n-i" onclick="nav('myMatch', this)"><i class="fas fa-trophy"></i>My Match</div>
        <div class="n-i" onclick="nav('profile', this)"><i class="fas fa-user"></i>Profile</div>
    </div>

    <script>
        // Your Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "742786792386", 
            appId: "1:742786792386:web:0c4daffc8b227a9ebf745b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        function loadAppData(uid) {
            // ১. ম্যাচ এবং জয়েন লজিক
            db.ref('matches').on('value', snap => {
                let hPlay = "", hMy = "";
                snap.forEach(c => {
                    let m = c.val(), id = c.key;
                    let joined = m.joined && m.joined[uid];
                    let total = m.totalSlots || 48, cur = m.joined ? Object.keys(m.joined).length : 0;
                    let fill = (cur/total) * 100;

                    let html = `
                    <div class="card">
                        <span class="m-mode">${m.type || 'SOLO'}</span>
                        <div class="m-no">#${m.matchNo} ${m.name}</div>
                        
                        <div id="timer_${id}" class="timer-box upcoming">Initializing...</div>

                        <div class="slot-row">
                            <span><i class="far fa-calendar-alt"></i> ${m.date || 'TBA'}</span>
                            <span>${cur}/${total} Joined</span>
                        </div>
                        <div class="slot-bar"><div class="slot-fill" style="width:${fill}%"></div></div>

                        <div class="info-grid">
                            <div class="i-item"><span>Prize</span><b>${m.prize} TK</b></div>
                            <div class="i-item"><span>Kill</span><b>${m.kill} TK</b></div>
                            <div class="i-item"><span>Entry</span><b>${m.entry} TK</b></div>
                        </div>

                        <div class="btn-row">
                            <button class="white-btn" onclick="showRules('${id}')"><i class="fas fa-file-alt"></i> Rules</button>
                            <button class="white-btn" onclick="showIdPass('${id}')"><i class="fas fa-key"></i> ID & Pass</button>
                        </div>
                        <button class="join-btn ${joined ? 'joined' : ''}">${joined ? 'JOINED' : 'JOIN NOW'}</button>
                    </div>`;
                    
                    hPlay += html; if(joined) hMy += html;
                    runTimer(m.startTime, id);
                });
                document.getElementById('mList').innerHTML = hPlay;
                document.getElementById('myMList').innerHTML = hMy || "No Joined Matches";
            });

            // ২. রেজাল্ট টেবিল লজিক
            db.ref('results').on('value', snap => {
                let h = "";
                snap.forEach(c => {
                    let r = c.val();
                    h += `<div class="card">
                        <b style="color:var(--gold); font-family:'Orbitron';">🏆 MATCH #${r.matchNo} RESULT</b>
                        <table class="res-table">
                            <tr><th>PLAYER</th><th style="text-align:center">KILL</th><th style="text-align:right">WIN</th></tr>
                            <tr>
                                <td>${r.playerName || 'N/A'}</td>
                                <td style="text-align:center">${r.kills || 0}</td>
                                <td style="text-align:right; color:var(--gold);">${r.prize || 0} TK</td>
                            </tr>
                        </table>
                    </div>`;
                });
                document.getElementById('rList').innerHTML = h || "Results Pending...";
            });

            // ৩. প্রোফাইল ডাটা
            db.ref('users/'+uid).on('value', s => {
                let u = s.val() || {};
                document.getElementById('uName').innerText = u.ign || "Player";
                document.getElementById('mBal').innerText = (u.mainBalance || 0) + " TK";
                document.getElementById('dBal').innerText = (u.depositBalance || 0) + " TK";
                document.getElementById('mPlayed').innerText = u.played || 0;
            });
        }

        // টাইম কাউন্টডাউন
        function runTimer(time, id) {
            setInterval(() => {
                let diff = new Date(time).getTime() - new Date().getTime();
                let el = document.querySelectorAll(`#timer_${id}`);
                el.forEach(e => {
                    if(diff <= 0) { e.innerHTML = "MATCH STARTED"; e.classList.remove('upcoming'); }
                    else {
                        let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                        e.innerHTML = `Starts In: ${h}h ${m}m ${s}s`;
                    }
                });
            }, 1000);
        }

        // ৫ মিনিটের আইডি-পাস নোটিশ
        function showIdPass(id) {
            db.ref('matches/'+id).once('value', s => {
                let m = s.val();
                if(!m.joined || !m.joined[auth.currentUser.uid]) return Swal.fire('Error','আগে জয়েন করুন!','error');
                
                if(!m.roomId || m.roomId == "Pending") {
                    Swal.fire({
                        title: 'ID & Pass',
                        text: 'Match shuru hobar 5 minute age ID Pass dewa hobe।',
                        icon: 'info',
                        confirmButtonColor: 'var(--p)'
                    });
                } else {
                    Swal.fire({
                        title: 'Room Info',
                        html: `ID: <b>${m.roomId}</b><br>Pass: <b>${m.roomPass}</b>`,
                        icon: 'success'
                    });
                }
            });
        }

        function showRules(id) {
            db.ref('matches/'+id).once('value', s => {
                Swal.fire({ title: 'Rules', text: s.val().rules || 'Follow general rules.', icon: 'info' });
            });
        }

        function nav(id, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        auth.onAuthStateChanged(user => { if(user) loadAppData(user.uid); });
    </script>
</body>
</html>
