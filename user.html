<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 75px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #222; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); font-size: 22px; }
        .sec { display: none; padding: 12px; } .sec.active { display: block; }
        
        /* Match Card Styles */
        .card { background: var(--c); border-radius: 18px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; border-left: 6px solid var(--p); position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
        .g-box { background: #1a1a1a; padding: 10px; border-radius: 10px; text-align: center; font-size: 10px; border: 1px solid #333; }
        .g-box b { color: var(--p); display: block; font-size: 14px; margin-top: 2px; }

        /* Slot Bar */
        .slot-bg { width: 100%; height: 10px; background: #222; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .slot-bar { height: 100%; background: var(--p); transition: 0.5s; box-shadow: 0 0 10px var(--p); }

        /* Locked Room */
        .room-box { background: #001f00; border: 1px dashed var(--p); padding: 15px; border-radius: 12px; margin-top: 15px; color: var(--p); display: none; text-align: center; font-weight: bold; }
        
        .btn { background: var(--p); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Poppins'; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; }

        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 11px; transition: 0.3s; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 5px; }

        #auth-s { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--b); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth-s">
        <div style="width: 85%; background: #111; padding: 35px; border-radius: 25px; border: 1px solid var(--p); text-align:center;">
            <h2 class="title">TESLA LOGIN</h2>
            <input type="email" id="em" placeholder="Your Email">
            <input type="password" id="ps" placeholder="Password">
            <button class="btn" onclick="hAuth()">LOG IN</button>
            <p onclick="tAuth()" id="at" style="margin-top:20px; font-size:12px; color:var(--p);">New User? Create Account</p>
        </div>
    </div>

    <div class="header"><div class="title">TESLA ESPORTS</div></div>

    <div id="play" class="sec active">
        <div id="mList">Loading Tournaments...</div>
    </div>

    <div id="wallet" class="sec">
        <div class="card" style="text-align:center;"><h2 id="w_bal" style="color:var(--p); margin:0;">0 TK</h2><small>Available Balance</small></div>
        <div class="card">
            <h3>💳 Wallet Center</h3>
            <select id="p_type"><option value="Deposit">Deposit (Cash In)</option><option value="Withdraw">Withdraw (Cash Out)</option></select>
            <input type="number" id="p_amount" placeholder="Amount (TK)">
            <input type="text" id="p_number" placeholder="Bkash/Nagad Number">
            <button class="btn" onclick="sendReq()">Submit to Admin</button>
        </div>
    </div>

    <div id="pro" class="sec">
        <div class="card" style="text-align:center;">
            <div style="background:#1a1a1a; padding:10px; border-radius:25px; color:var(--p); margin-bottom:15px; border:1px solid #333;" id="uIgn">IGN: Loading...</div>
            <p style="font-size:11px; color:#666;" id="myUid">UID: ...</p>
            <input type="text" id="ignIn" placeholder="Update In-Game Name">
            <button class="btn" style="width:auto; padding:8px 30px;" onclick="upIgn()">SAVE IGN</button>
        </div>
        <button class="btn" style="background:#ff3333; color:white; margin-top:20px;" onclick="auth.signOut()">Logout Session</button>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('play', this)"><i class="fas fa-gamepad"></i>Play</div>
        <div class="n-i" onclick="nav('wallet', this)"><i class="fas fa-wallet"></i>Wallet</div>
        <div class="n-i" onclick="nav('pro', this)"><i class="fas fa-user-shield"></i>Profile</div>
    </div>

    <script>
        const conf = { databaseURL: "const conf = { databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app" };
" };
        firebase.initializeApp(conf);
        const auth = firebase.auth(); const db = firebase.database();
        let isL = true;

        // Sync Theme
        db.ref('settings/theme').on('value', s => { if(s.val()) document.documentElement.style.setProperty('--p', s.val().color); });

        // Auth Logic
        function tAuth() { isL = !isL; document.getElementById('at').innerText = isL?"Need Account? Register":"Back to Login"; }
        function hAuth() {
            let e = document.getElementById('em').value, p = document.getElementById('ps').value;
            if(isL) auth.signInWithEmailAndPassword(e,p).catch(a => alert(a.message));
            else auth.createUserWithEmailAndPassword(e,p).then(r => db.ref('users/'+r.user.uid).set({played:0, winning:0, ign: "Player"})).catch(a => alert(a.message));
        }

        auth.onAuthStateChanged(u => {
            if(u){ document.getElementById('auth-s').style.display='none'; document.getElementById('myUid').innerText = "UID: "+u.uid; loadUser(u.uid); }
            else { document.getElementById('auth-s').style.display='flex'; }
        });

        function loadUser(uid) {
            db.ref('users/'+uid).on('value', s => { if(s.val()){ document.getElementById('uIgn').innerText = "IGN: " + s.val().ign; document.getElementById('w_bal').innerText = s.val().winning + " TK"; }});
        }

        function upIgn() { db.ref('users/'+auth.currentUser.uid).update({ign: document.getElementById('ignIn').value}); alert("IGN Saved!"); }

        function sendReq() {
            db.ref('payments').push({ uid: auth.currentUser.uid, type: document.getElementById('p_type').value, amount: parseInt(document.getElementById('p_amount').value), number: document.getElementById('p_number').value });
            alert("Request sent to Admin. Wait for approval!");
        }

        function nav(id, el) { 
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        // Live Matches Logic
        db.ref('matches').on('value', snap => {
            let h = ""; snap.forEach(c => {
                let m = c.val(), mId = c.key;
                let joined = m.joined ? Object.keys(m.joined).length : 0;
                let isJoined = m.joined && m.joined[auth.currentUser.uid];
                h += `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>#${m.matchNo} ${m.name}</b>
                        <small id="t_${mId}" style="color:gold; font-weight:bold;">--:--</small>
                    </div>
                    <div style="font-size:11px; color:#666;">Category: ${m.mode}</div>
                    <div class="grid">
                        <div class="g-box">PRIZE<b>${m.prize}</b></div><div class="g-box">KILL<b>${m.perKill}</b></div><div class="g-box">ENTRY<b>${m.entry}</b></div>
                    </div>
                    <div class="slot-bg"><div class="slot-bar" style="width:${(joined/m.totalSlots)*100}%"></div></div>
                    <div style="font-size:10px; color:#888; margin-bottom:12px;">Slot Status: ${joined}/${m.totalSlots} Players</div>
                    <div class="room-box" style="display: ${isJoined ? 'block' : 'none'}">
                        Room ID: ${m.roomId || 'Wait'} | Pass: ${m.roomPass || 'Wait'}
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button class="btn" onclick="db.ref('matches/${mId}/joined/${auth.currentUser.uid}').set(true)">${joined>=m.totalSlots?'FULL':'JOIN NOW'}</button>
                        <button class="btn" style="background:#222; color:white; width:45%;" onclick="alert('Rules: ${m.rules}')">RULES</button>
                    </div>
                </div>`;
                startTimer(m.startTime, `t_${mId}`);
            });
            document.getElementById('mList').innerHTML = h || "No tournaments currently available.";
        });

        function startTimer(time, id) {
            setInterval(() => {
                let d = new Date(time).getTime() - new Date().getTime();
                if(d < 0) { document.getElementById(id).innerText = "LIVE NOW"; return; }
                let m = Math.floor(d / 60000), s = Math.floor((d % 60000) / 1000);
                document.getElementById(id).innerText = m + "m " + s + "s";
            }, 1000);
        }
    </script>
</body>
</html>
