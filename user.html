<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Pro App</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --red: #ff3333; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        
        #auth-s { position: fixed; inset: 0; background: var(--b); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--p); text-align:center; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); font-size: 20px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; outline: none; box-sizing: border-box; }
        .btn { background: var(--p); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn:disabled { background: #444; color: #888; }
        
        .header { padding: 15px; text-align: center; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .sec { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .sec.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .card { background: var(--c); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; position: relative; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .g-box { background: #1a1a1a; padding: 8px; border-radius: 8px; text-align: center; font-size: 9px; border: 1px solid #333; color: #888; }
        .g-box b { color: var(--p); display: block; font-size: 13px; }
        
        .m-actions { display: flex; gap: 10px; margin-top: 12px; margin-bottom: 5px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: 600; }
        .action-btn i { color: var(--p); font-size: 14px; }

        .p-img-box { position: relative; width: 90px; height: 90px; margin: 0 auto 10px; }
        .p-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--p); object-fit: cover; background: #222; }
        .plus-icon { position: absolute; bottom: 0; right: 0; background: var(--p); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid var(--b); cursor: pointer; }
        
        .name-container { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 5px 0; }
        .edit-name-icon { font-size: 14px; color: var(--p); cursor: pointer; background: rgba(0, 255, 0, 0.1); padding: 5px; border-radius: 50%; transition: 0.3s; }

        .w-card { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid #333; }
        .stats { display: flex; justify-content: space-around; margin: 15px 0; border-top: 1px solid #222; padding-top: 15px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }

        .dep-card { background: #111; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .dep-title { color: var(--p); font-size: 16px; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; font-family: 'Orbitron'; }
        .dep-msg { font-size: 12px; color: #bbb; line-height: 1.6; margin-bottom: 12px; border-left: 3px solid var(--p); padding-left: 10px; }
        .file-label { display: block; background: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px dashed #444; text-align: center; color: #888; font-size: 12px; cursor: pointer; margin: 10px 0; }
        .file-label i { display: block; font-size: 20px; margin-bottom: 5px; color: var(--p); }

        .timer { font-size: 11px; color: #ffcc00; font-weight: bold; background: rgba(255, 204, 0, 0.1); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px; border: 1px solid rgba(255, 204, 0, 0.2); }
        .room-box { background: rgba(0, 255, 0, 0.05); padding: 10px; border-radius: 8px; margin-top: 5px; border: 1px solid var(--p); font-size: 12px; text-align: center; color: var(--p); }
        .m-badge { background: #1a1a1a; color: #00ffff; padding: 2px 8px; border-radius: 6px; font-size: 10px; border: 1px solid #00ffff; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="auth-s">
        <div class="auth-card">
            <h2 class="title" id="at-title">TESLA LOGIN</h2>
            <input type="email" id="em" placeholder="Email">
            <input type="password" id="ps" placeholder="Password">
            <button class="btn" id="m-btn" onclick="handleAuth()">LOG IN</button>
            <p style="font-size: 12px; color: var(--p); cursor:pointer; margin-top:15px;" onclick="toggleAuth()" id="t-text">New User? Create Account</p>
        </div>
    </div>

    <div class="header"><div class="title">TESLA ESPORTS</div></div>

    <div id="play" class="sec active">
        <div id="mList" style="text-align: center; color: #666; margin-top: 30px;">Loading Matches...</div>
    </div>

    <div id="result" class="sec">
        <h3 style="color: var(--p);"><i class="fas fa-poll-h"></i> Match Results</h3>
        <div id="rList"></div>
    </div>

    <div id="myMatches" class="sec">
        <h3 style="color: var(--p);"><i class="fas fa-crosshairs"></i> My Matches</h3>
        <div id="myMList"></div>
    </div>

    <div id="pro" class="sec">
        <div class="w-card">
            <div class="p-img-box">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" id="uPic" class="p-img">
                <input type="file" id="proPicFile" style="display:none;" accept="image/*" onchange="uploadProfilePic(this)">
                <label for="proPicFile" class="plus-icon">
                    <i class="fas fa-plus"></i>
                </label>
            </div>
            
            <div class="name-container">
                <h3 id="uIgn" style="margin:0;">Player Name</h3>
                <i class="fas fa-pen edit-name-icon" onclick="editNamePopup()"></i>
            </div>
            
            <p id="myUid" style="font-size: 10px; color: #666;">UID: ...</p>
            
            <div class="stats">
                <div>Match Played<b id="st_p" style="display:block; color:var(--p);">0</b></div>
                <div>Winning<b id="st_w" style="display:block; color:var(--p);">0 TK</b></div>
            </div>

            <p style="font-size: 12px; color: #888; margin-bottom: 0;">Main Balance</p>
            <h2 id="w_bal" style="color:var(--p); margin:5px 0; font-family: 'Orbitron';">0 TK</h2>
        </div>

        <div class="dep-card">
            <div class="dep-title"><i class="fas fa-wallet"></i> DEPOSIT</div>
            <p class="dep-msg">টাকা ডিপোজিট করতে চাইলে <b>01774774830</b> এই নম্বর এ নগদ / bKash এ টাকা পাঠিয়ে screenshot পাঠান।</p>
            <input type="number" id="depAmount" placeholder="টাকার পরিমাণ (Amount)">
            <label for="depFile" class="file-label">
                <i class="fas fa-cloud-upload-alt"></i>
                <span id="fileName">Select Payment Screenshot</span>
            </label>
            <input type="file" id="depFile" style="display:none;" accept="image/*" onchange="updateFileName()">
            <button class="btn" id="depBtn" onclick="uploadDeposit()">SEND SCREENSHOT</button>
        </div>

        <button class="btn" style="background:var(--red); color:white; margin-top:20px;" onclick="firebase.auth().signOut()">LOGOUT</button>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('play', this)"><i class="fas fa-gamepad"></i>Play</div>
        <div class="n-i" onclick="nav('result', this)"><i class="fas fa-poll"></i>Result</div>
        <div class="n-i" onclick="nav('myMatches', this)"><i class="fas fa-trophy"></i>My Match</div>
        <div class="n-i" onclick="nav('pro', this)"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "742786792386", 
            appId: "1:742786792386:web:0c4daffc8b227a9ebf745b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();
        const IMGBB_API = 'bb6ae5282e75af49c1e446d17733e498'; 

        let isLogin = true; // State for Login/Register

        function toast(t, m, i) {
            Swal.fire({ title: t, text: m, icon: i, background: '#111', color: '#fff', confirmButtonColor: '#00ff00' });
        }

        // Auth Logic
        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('at-title').innerText = isLogin ? "TESLA LOGIN" : "CREATE ACCOUNT";
            document.getElementById('m-btn').innerText = isLogin ? "LOG IN" : "REGISTER";
            document.getElementById('t-text').innerText = isLogin ? "New User? Create Account" : "Already have an account? Login";
        }

        function handleAuth() {
            const e = document.getElementById('em').value, p = document.getElementById('ps').value;
            const btn = document.getElementById('m-btn');
            if(!e || !p) return toast("Empty!", "দয়া করে ইমেইল ও পাসওয়ার্ড দিন", "warning");
            
            btn.disabled = true; btn.innerText = "Please Wait...";

            if(isLogin) {
                auth.signInWithEmailAndPassword(e, p).catch((err) => {
                    toast("Error!", "ভুল ইমেইল বা পাসওয়ার্ড", "error");
                    btn.disabled = false; btn.innerText = "LOG IN";
                });
            } else {
                auth.createUserWithEmailAndPassword(e, p).then(r => {
                    db.ref('users/' + r.user.uid).set({ winning: 0, ign: "Player", pic: "", played: 0 });
                    toast("Success!", "অ্যাকাউন্ট তৈরি হয়েছে", "success");
                    btn.disabled = false; btn.innerText = "REGISTER";
                }).catch(err => {
                    toast("Error!", err.message, "error");
                    btn.disabled = false; btn.innerText = "REGISTER";
                });
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-s').style.display = 'none';
                document.getElementById('myUid').innerText = "UID: " + user.uid;
                loadApp(user.uid);
            } else {
                document.getElementById('auth-s').style.display = 'flex';
                document.getElementById('m-btn').disabled = false;
                document.getElementById('m-btn').innerText = isLogin ? "LOG IN" : "REGISTER";
            }
        });

        // App Features
        function editNamePopup() {
            Swal.fire({
                title: 'Edit In-Game Name',
                input: 'text',
                inputPlaceholder: 'নতুন নাম লিখুন...',
                showCancelButton: true,
                confirmButtonText: 'Update',
                background: '#111', color: '#fff', confirmButtonColor: '#00ff00',
                preConfirm: (n) => { if (!n) Swal.showValidationMessage('নাম প্রয়োজন!'); return n; }
            }).then((res) => {
                if (res.isConfirmed) {
                    db.ref('users/' + auth.currentUser.uid).update({ ign: res.value })
                    .then(() => toast("Success!", "নাম আপডেট হয়েছে!", "success"));
                }
            });
        }

        function uploadProfilePic(input) {
            if (input.files && input.files[0]) {
                Swal.fire({ title: 'Uploading...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const fd = new FormData(); fd.append("image", input.files[0]);
                fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: "POST", body: fd })
                .then(r => r.json()).then(data => {
                    if (data.success) {
                        db.ref('users/' + auth.currentUser.uid).update({ pic: data.data.url }).then(() => {
                            document.getElementById('uPic').src = data.data.url;
                            Swal.fire('Success', 'প্রোফাইল পিকচার সেভ হয়েছে!', 'success');
                        });
                    }
                }).catch(() => Swal.fire('Error', 'আপলোড ফেইল!', 'error'));
            }
        }

        function updateFileName() {
            const f = document.getElementById('depFile').files[0];
            if(f) document.getElementById('fileName').innerText = "Selected: " + f.name;
        }

        function uploadDeposit() {
            const amt = document.getElementById('depAmount').value, f = document.getElementById('depFile').files[0], btn = document.getElementById('depBtn');
            if(!amt || !f) return toast("Warning!", "সবগুলো ঘর পূরণ করুন", "warning");
            btn.disabled = true; btn.innerText = "Uploading...";
            const fd = new FormData(); fd.append('image', f);
            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API}`, { method: 'POST', body: fd })
            .then(r => r.json()).then(data => {
                if(data.success) {
                    db.ref('payments').push({ uid: auth.currentUser.uid, amount: parseInt(amt), ssUrl: data.data.url, time: Date.now(), status: "Pending" })
                    .then(() => {
                        toast("Success!", "রিকোয়েস্ট পাঠানো হয়েছে!", "success");
                        document.getElementById('depAmount').value = ""; document.getElementById('fileName').innerText = "Select Screenshot";
                        btn.disabled = false; btn.innerText = "SEND SCREENSHOT";
                    });
                }
            });
        }

        function loadApp(uid) {
            db.ref('users/' + uid).on('value', s => {
                const d = s.val();
                if(d) {
                    document.getElementById('uIgn').innerText = d.ign || "Player";
                    document.getElementById('w_bal').innerText = (d.winning || 0) + " TK";
                    document.getElementById('st_w').innerText = (d.winningPrize || d.winning || 0) + " TK";
                    document.getElementById('st_p').innerText = d.played || 0;
                    if(d.pic) document.getElementById('uPic').src = d.pic;
                }
            });
            loadMatches(uid); loadResults();
        }

        function loadMatches(uid) {
            db.ref('matches').on('value', snap => {
                let hPlay = "", hMy = "";
                snap.forEach(c => {
                    let m = c.val(), id = c.key, joined = m.joined ? Object.keys(m.joined).length : 0, isJoined = m.joined && m.joined[uid];
                    let card = `<div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="color:var(--p); font-weight:bold;">#${m.matchNo} ${m.name}</span>
                            <span class="m-badge">${m.mode || 'Classic'}</span>
                        </div>
                        <div class="timer"><i class="fas fa-clock"></i> Upcoming</div>
                        <div class="grid">
                            <div class="g-box">PRIZE<b>${m.prize}</b></div>
                            <div class="g-box">KILL<b>${m.perKill}</b></div>
                            <div class="g-box">ENTRY<b>${m.entry}</b></div>
                        </div>
                        <div class="m-actions">
                            <button class="action-btn" onclick="showRules()"><i class="fas fa-file-alt"></i> Rules</button>
                            ${isJoined ? `<button class="action-btn" onclick="showRoomInfo('${m.roomId}','${m.roomPass}')"><i class="fas fa-key"></i> ID & Pass</button>` : ''}
                        </div>
                        ${isJoined ? `<div class="room-box">Joined</div>` : `<button class="btn" onclick="joinM('${id}',${m.entry},${joined},${m.totalSlots})">JOIN (${joined}/${m.totalSlots})</button>`}
                    </div>`;
                    hPlay += card; if(isJoined) hMy += card;
                });
                document.getElementById('mList').innerHTML = hPlay || "No Live Matches.";
                document.getElementById('myMList').innerHTML = hMy || "Not joined.";
            });
        }

        function showRules() { Swal.fire({ title: 'Rules', text: 'No hacks allowed. Play fair!', background: '#111', color: '#fff' }); }
        function showRoomInfo(i, p) { Swal.fire({ title: 'Room Info', html: `ID: ${i}<br>Pass: ${p}`, background: '#111', color: '#fff' }); }
        function joinM(id, fee, n, t) {
            if(n >= t) return toast("Full!", "স্লট নেই", "error");
            db.ref('users/' + auth.currentUser.uid).once('value', s => {
                let b = s.val().winning || 0;
                if(b < fee) return toast("Low Balance!", "টাকা নেই", "error");
                db.ref('users/' + auth.currentUser.uid).update({ winning: b - fee, played: (s.val().played || 0) + 1 });
                db.ref('matches/' + id + '/joined/' + auth.currentUser.uid).set(true);
                toast("Success!", "জয়েন হয়েছেন", "success");
            });
        }
        function nav(id, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }
        function loadResults() {
            db.ref('results').on('value', snap => {
                let h = ""; snap.forEach(c => { h += `<div class="card">#${c.val().matchNo} - Winner: ${c.val().winner}</div>`; });
                document.getElementById('rList').innerHTML = h || "No Results.";
            });
        }
    </script>
</body>
</html>
