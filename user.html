<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Ultimate Pro Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --red: #ff3333; --gold: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
        
        /* Auth Screen */
        #auth-s { position: fixed; inset: 0; background: var(--b); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 85%; background: #111; padding: 30px; border-radius: 20px; border: 2px solid var(--p); text-align:center; }
        
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); font-size: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; outline: none; box-sizing: border-box; }
        .btn { background: var(--p); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .sec { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .sec.active { display: block; }
        
        /* Match Card Style */
        .card { background: var(--c); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #222; }
        .m-title { color: var(--p); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .m-badge { background: #1a1a1a; color: #00ffff; padding: 2px 8px; border-radius: 6px; font-size: 10px; border: 1px solid #00ffff; font-family: 'Orbitron'; float: right; }
        .status-tag { color: var(--gold); font-size: 13px; font-weight: bold; background: rgba(255, 204, 0, 0.1); padding: 5px 12px; border-radius: 20px; display: inline-block; margin: 8px 0; border: 1px solid rgba(255, 204, 0, 0.2); width: 100%; box-sizing: border-box; text-align: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 0; }
        .g-box { background: #1a1a1a; padding: 8px; border-radius: 8px; text-align: center; font-size: 9px; border: 1px solid #333; color: #888; }
        .g-box b { color: var(--p); display: block; font-size: 14px; }
        
        /* Action Buttons */
        .m-actions { display: flex; gap: 10px; margin: 15px 0 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #fff; color: #000; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; }
        .action-btn i { color: #000; font-size: 15px; }

        /* Profile Style */
        .profile-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        #userImg { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); background: #222; box-shadow: 0 0 15px rgba(0,255,0,0.2); }
        .plus-icon { position: absolute; bottom: 5px; right: 5px; background: var(--p); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #000; cursor: pointer; }
        .dep-area { background: #151515; border: 1px dashed #444; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left; }

        /* Result Table Style */
        .res-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #000; border-radius: 10px; overflow: hidden; }
        .res-table th { background: #222; color: var(--p); padding: 12px; font-size: 14px; text-align: left; border-bottom: 2px solid #333; }
        .res-table td { padding: 12px; border-bottom: 1px solid #222; font-size: 15px; font-weight: 600; }
        .res-title { font-size: 22px; color: var(--p); font-family: 'Orbitron'; text-align: center; margin-bottom: 10px; }

        /* Nav Bar */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="auth-s"><div class="auth-card"><h2 class="title">TESLA LOGIN</h2><input type="email" id="em" placeholder="Email"><input type="password" id="ps" placeholder="Password"><button class="btn" onclick="handleAuth()">LOG IN</button><p onclick="toggleAuth()" style="color:var(--p); font-size:12px; margin-top:15px;">New User? Create Account</p></div></div>

    <div class="header">
        <div onclick="Swal.fire('Notifications','No new messages.','info')"><i class="fas fa-bell" style="color: var(--p); font-size: 22px;"></i></div>
        <div class="title">TESLA ESPORTS</div>
        <div style="width:22px;"></div>
    </div>

    <div id="play" class="sec active"><div id="mList">Loading Matches...</div></div>
    <div id="result" class="sec"><div id="rList">Loading Results...</div></div>
    <div id="myMatches" class="sec"><div id="myMList">Loading Your Matches...</div></div>

    <div id="pro" class="sec">
        <div class="card" style="text-align:center;">
            <div class="profile-container">
                <img id="userImg" src="https://via.placeholder.com/110">
                <label for="imgUp" class="plus-icon"><i class="fas fa-plus"></i></label>
                <input type="file" id="imgUp" hidden accept="image/*" onchange="uploadProfilePic(this)">
            </div>
            <h3 id="uIgn" style="margin-bottom: 15px;">Player Name</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr;">
                <div class="g-box">MAIN BALANCE <b id="main_bal">0 TK</b></div>
                <div class="g-box">PLAYED MATCH <b id="p_match">0</b></div>
            </div>
            <div class="dep-area">
                <h4 style="color:var(--p); margin:0;">DEPOSIT</h4>
                <p style="font-size:11px; color:#aaa; margin-top:5px;">বিকাশ/নগদ (Send Money): <b>01774774830</b></p>
                <input type="number" id="depAmt" placeholder="Amount (TK)">
                <label style="font-size: 10px; color: var(--p); display: block; text-align: left; margin-top: 5px;">পেমেন্ট স্ক্রিনশট দিন:</label>
                <input type="file" id="depPrf" accept="image/*">
                <button class="btn" onclick="submitDeposit()">SUBMIT REQUEST</button>
            </div>
            <button class="btn" style="background:var(--red); color:#fff; margin-top:20px;" onclick="firebase.auth().signOut()">LOGOUT</button>
        </div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('play', this)"><i class="fas fa-gamepad"></i>Play</div>
        <div class="n-i" onclick="nav('result', this)"><i class="fas fa-poll"></i>Result</div>
        <div class="n-i" onclick="nav('myMatches', this)"><i class="fas fa-trophy"></i>My Match</div>
        <div class="n-i" onclick="nav('pro', this)"><i class="fas fa-user-circle"></i>Profile</div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "742786792386", 
            appId: "1:742786792386:web:0c4daffc8b227a9ebf745b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database(), storage = firebase.storage();

        // ১. ম্যাচ এবং কাউন্টডাউন লোডিং
        function loadMatches(uid) {
            db.ref('matches').on('value', snap => {
                let hPlay = "", hMy = "";
                snap.forEach(c => {
                    let m = c.val(), id = c.key;
                    let joined = m.joinedCount || 0;
                    let isJoined = m.joined && m.joined[uid];
                    
                    let matchHTML = `<div class="card">
                        <span class="m-badge">${m.mode}</span>
                        <div class="m-title">#${m.matchNo} ${m.name}</div>
                        <div id="timer_${id}" class="status-tag">Initializing...</div>
                        <div class="grid">
                            <div class="g-box">PRIZE<b>${m.prize} TK</b></div>
                            <div class="g-box">KILL<b>${m.perKill} TK</b></div>
                            <div class="g-box">ENTRY FEE<b>${m.entry} TK</b></div>
                        </div>
                        <div class="m-actions">
                            <button class="action-btn" onclick="showRules('${id}')"><i class="fas fa-file-alt"></i> Rules</button>
                            <button class="action-btn" onclick="showIdPass('${id}')"><i class="fas fa-key"></i> ID & Pass</button>
                        </div>
                        ${isJoined ? `<button class="btn" style="background:#222; color:var(--p); border:1px solid var(--p);">JOINED</button>` : 
                        `<button class="btn" onclick="joinMatch('${id}', ${m.entry}, ${joined}, ${m.maxSlots})">JOIN (${joined}/${m.maxSlots})</button>`}
                    </div>`;
                    
                    hPlay += matchHTML;
                    if(isJoined) hMy += matchHTML;
                    startTimer(m.startTime, `timer_${id}`);
                });
                document.getElementById('mList').innerHTML = hPlay || "No Live Matches.";
                document.getElementById('myMList').innerHTML = hMy || "You haven't joined any matches.";
            });

            // ২. রেজাল্ট সেকশন (Fix: Player Name & Win display)
            db.ref('results').on('value', s => {
                let h = "";
                s.forEach(c => {
                    let r = c.val();
                    // ডাটাবেস থেকে সব ধরনের কী (Key) চেক করা হচ্ছে যাতে Undefined না আসে
                    let players = (r.winners || r.winnerName || "").toString().split(',');
                    let kills = (r.kills || r.killCounts || "0").toString().split(',');
                    let winnings = (r.prize || r.winningAmounts || "0").toString().split(',');

                    let rows = "";
                    players.forEach((p, i) => {
                        let name = p.trim();
                        if(name !== "") {
                            rows += `<tr>
                                <td style="color:#fff;">${name}</td>
                                <td style="text-align:center; color:var(--p);">${kills[i] ? kills[i].trim() : '0'}</td>
                                <td style="text-align:right; color:var(--gold);">${winnings[i] ? winnings[i].trim() : '0'} TK</td>
                            </tr>`;
                        }
                    });

                    h += `<div class="card" style="border: 2px solid var(--p);">
                        <div class="res-title">🏆 MATCH #${r.matchNo}</div>
                        <table class="res-table">
                            <thead>
                                <tr><th>PLAYER</th><th style="text-align:center;">KILL</th><th style="text-align:right;">WIN</th></tr>
                            </thead>
                            <tbody>${rows || '<tr><td colspan="3" style="text-align:center;">No Result Data</td></tr>'}</tbody>
                        </table>
                    </div>`;
                });
                document.getElementById('rList').innerHTML = h || "Results will be published soon.";
            });
        }

        // ৩. রিয়েল-টাইম কাউন্টডাউন
        function startTimer(time, elId) {
            function update() {
                let dest = new Date(time).getTime();
                let now = new Date().getTime();
                let diff = dest - now;
                let el = document.getElementById(elId);
                if(!el) return;
                if(diff <= 0) { 
                    el.innerHTML = "MATCH STARTED"; 
                    el.style.color = "#ff3333"; 
                } else {
                    let h = Math.floor(diff/(1000*60*60)), m = Math.floor((diff%(1000*60*60))/(1000*60)), s = Math.floor((diff%(1000*60))/1000);
                    el.innerHTML = `<i class="fas fa-clock"></i> Starts In: ${h}h ${m}m ${s}s`;
                }
            }
            update();
            setInterval(update, 1000);
        }

        // ৪. বাটন ফাংশনসমূহ (Rules & ID/Pass)
        function showRules(id) {
            db.ref('matches/' + id).once('value', s => {
                Swal.fire({ title: 'Rules', text: s.val().rules || "No rules defined.", background: '#111', color: '#fff' });
            });
        }

        function showIdPass(id) {
            db.ref('matches/' + id).once('value', s => {
                let m = s.val();
                if(!m.joined || !m.joined[auth.currentUser.uid]) return Swal.fire('Error', 'ম্যাচে জয়েন করলেই কেবল আইডি পাস পাবেন।', 'error');
                if(!m.roomId || m.roomId == "Pending") Swal.fire('Wait', 'ম্যাচ শুরু হওয়ার ৫-১০ মিনিট আগে আইডি পাস দেওয়া হবে।', 'info');
                else Swal.fire({ title: 'Room Details', html: `Room ID: ${m.roomId}<br>Pass: ${m.roomPass}`, icon: 'success' });
            });
        }

        // ৫. প্রোফাইল ও ডিপোজিট
        function uploadProfilePic(input) {
            let file = input.files[0]; if(!file) return;
            let ref = storage.ref('profiles/' + auth.currentUser.uid);
            Swal.showLoading();
            ref.put(file).then(() => ref.getDownloadURL().then(url => {
                db.ref('users/' + auth.currentUser.uid).update({ profilePic: url });
                document.getElementById('userImg').src = url; Swal.close();
            }));
        }

        function submitDeposit() {
            let amt = document.getElementById('depAmt').value;
            let file = document.getElementById('depPrf').files[0];
            if(!amt || !file) return Swal.fire('Error', 'সব তথ্য দিন।', 'error');
            let depId = Date.now();
            Swal.showLoading();
            storage.ref('deposits/'+depId).put(file).then(() => storage.ref('deposits/'+depId).getDownloadURL().then(url => {
                db.ref('deposit_requests/'+depId).set({ uid: auth.currentUser.uid, amount: amt, screenshot: url, status: 'Pending', time: new Date().toLocaleString() });
                Swal.fire('Success', 'রিকোয়েস্ট পাঠানো হয়েছে।', 'success');
            }));
        }

        // Auth Logic
        function handleAuth() {
            let e = document.getElementById('em').value, p = document.getElementById('ps').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => Swal.fire('Error', err.message, 'error'));
        }

        function toggleAuth() {
            Swal.fire({
                title: 'Create Account',
                html: `<input id="sw-ign" class="swal2-input" placeholder="In Game Name"><input id="sw-em" class="swal2-input" placeholder="Email"><input id="sw-ps" type="password" class="swal2-input" placeholder="Password">`,
                preConfirm: () => {
                    let ign = document.getElementById('sw-ign').value, em = document.getElementById('sw-em').value, ps = document.getElementById('sw-ps').value;
                    return auth.createUserWithEmailAndPassword(em, ps).then(u => db.ref('users/'+u.user.uid).set({ ign, em, mainBalance: 0, playedMatches: 0 }));
                }
            });
        }

        auth.onAuthStateChanged(user => {
            if(user) { document.getElementById('auth-s').style.display='none'; loadApp(user.uid); }
            else { document.getElementById('auth-s').style.display='flex'; }
        });

        function loadApp(uid) {
            db.ref('users/' + uid).on('value', s => {
                let d = s.val(); if(d) {
                    document.getElementById('uIgn').innerText = d.ign || "Player";
                    document.getElementById('main_bal').innerText = (d.mainBalance || 0) + " TK";
                    document.getElementById('p_match').innerText = d.playedMatches || 0;
                    if(d.profilePic) document.getElementById('userImg').src = d.profilePic;
                }
            });
            loadMatches(uid);
        }

        function nav(id, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function joinMatch(mid, fee, current, max) {
            if(current >= max) return Swal.fire('Full!', 'স্লট শেষ।', 'warning');
            db.ref('users/' + auth.currentUser.uid).once('value', s => {
                let bal = s.val().mainBalance || 0;
                if(bal < fee) return Swal.fire('Error', 'ব্যালেন্স নেই।', 'error');
                db.ref('users/' + auth.currentUser.uid).update({ mainBalance: bal - fee });
                db.ref('matches/' + mid + '/joined/' + auth.currentUser.uid).set({ ign: s.val().ign, uid: auth.currentUser.uid });
                db.ref('matches/' + mid).update({ joinedCount: current + 1 });
                Swal.fire('Joined!', 'সফলভাবে জয়েন করেছেন।', 'success');
            });
        }
    </script>
</body>
</html>
