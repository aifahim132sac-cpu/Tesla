<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin - Ultimate Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --red: #ff3333; --blue: #00c2ff; --yellow: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); font-size: 18px; }
        
        .sec { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .sec.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .card { background: var(--c); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h3 { color: var(--p); font-family: 'Orbitron'; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 13px; }
        
        .btn { background: var(--p); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; }
        .btn:active { transform: scale(0.98); }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }

        .item { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--p); position: relative; }
        .del-btn { background: var(--red); color: #fff; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; position: absolute; right: 10px; top: 10px; }
        
        .room-box { background: #000; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px dashed #444; }
        .room-label { font-size: 11px; color: var(--blue); font-weight: 600; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .u-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding: 12px 0; }
        .u-info b { color: var(--p); font-size: 14px; }
        .u-info p { margin: 2px 0; font-size: 11px; color: #888; }

        .timer { font-size: 12px; color: var(--yellow); font-weight: bold; margin-top: 5px; display: block; border: 1px solid #333; padding: 4px; border-radius: 5px; text-align: center; background: #000; }
        .slot-tag { background: var(--blue); color: #000; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .player-list-box { background: #080808; margin-top: 10px; padding: 10px; border-radius: 8px; border: 1px solid #222; display: none; max-height: 200px; overflow-y: auto; }
        .p-row { font-size: 11px; padding: 5px 0; border-bottom: 1px solid #111; color: #ccc; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header"><div class="title">TESLA MASTER ADMIN</div></div>

    <div id="matches" class="sec active">
        <div class="card" style="border-top: 3px solid var(--yellow);">
            <h3><i class="fas fa-bullhorn" style="color:var(--yellow);"></i> Global Announcement</h3>
            <textarea id="notifMsg" placeholder="ইউজারদের জন্য কোনো জরুরি ঘোষণা লিখুন..."></textarea>
            <button class="btn" style="background:var(--yellow);" onclick="sendNotif()"><i class="fas fa-paper-plane"></i> Send Notification</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Create Tournament</h3>
            <input type="number" id="mNo" placeholder="Match No (Ex: 01)">
            <input type="text" id="mTitle" placeholder="Match Name">
            
            <div style="display:flex; gap:10px;">
                <select id="mType" style="flex:1;">
                    <option value="BR Solo">BR Solo</option>
                    <option value="BR Duo">BR Duo</option>
                    <option value="BR Squad">BR Squad</option>
                    <option value="Clash Squad">Clash Squad</option>
                    <option value="Lone Wolf 1vs1">Lone Wolf 1vs1</option>
                    <option value="Lone Wolf 2vs2">Lone Wolf 2vs2</option>
                    <option value="Free Match">Free Match</option>
                </select>
                <input type="number" id="mMaxSlots" placeholder="Total Slots (Ex: 48)" style="flex:1;">
            </div>

            <div style="display:flex; gap:10px;">
                <input type="number" id="mEntry" placeholder="Entry Tk">
                <input type="number" id="mKill" placeholder="Kill Tk">
                <input type="number" id="mPrize" placeholder="Prize Tk">
            </div>

            <textarea id="mRules" placeholder="Match Rules (যেমন: No Hack, No Grenade...)" rows="2"></textarea>

            <input type="datetime-local" id="mTime">
            <button class="btn" onclick="postMatch()"><i class="fas fa-check-circle"></i> Publish Match</button>
        </div>

        <h3><i class="fas fa-tasks"></i> Live Matches (Control Center)</h3>
        <div id="mList">Loading...</div>
    </div>

    <div id="payments" class="sec">
        <h3><i class="fas fa-wallet"></i> Deposit Requests</h3>
        <div id="pList">Loading Requests...</div>
    </div>

    <div id="results" class="sec">
        <div class="card">
            <h3><i class="fas fa-trophy"></i> Declare Result</h3>
            <input type="number" id="resMNo" placeholder="Match No">
            <select id="resMode">
                <option value="BR Solo">BR Solo</option>
                <option value="BR Duo">BR Duo</option>
                <option value="BR Squad">BR Squad</option>
                <option value="Clash Squad">Clash Squad</option>
                <option value="Lone Wolf 1vs1">Lone Wolf 1vs1</option>
                <option value="Lone Wolf 2vs2">Lone Wolf 2vs2</option>
                <option value="Free Match">Free Match</option>
            </select>
            <input type="text" id="resWinner" placeholder="Winner Name (Ex: Fahim, Percy)">
            <input type="text" id="resKillCount" placeholder="Kill Counts (Ex: 5, 2)">
            <input type="text" id="resWinAmt" placeholder="Winning Amounts (Ex: 100, 50)">
            <button class="btn" style="background:gold;" onclick="setResult()">Submit Result</button>
        </div>
        <h3><i class="fas fa-history"></i> Published Results</h3>
        <div id="rList"></div>
    </div>

    <div id="users" class="sec">
        <div class="card">
            <input type="text" id="uSearch" placeholder="🔍 Search User Name..." onkeyup="searchUser()">
        </div>
        <h3><i class="fas fa-users"></i> Registered Users</h3>
        <div id="uList">Loading Users...</div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('matches', this)"><i class="fas fa-gamepad"></i>Matches</div>
        <div class="n-i" onclick="nav('payments', this)"><i class="fas fa-money-bill-wave"></i>Payments</div>
        <div class="n-i" onclick="nav('results', this)"><i class="fas fa-poll"></i>Results</div>
        <div class="n-i" onclick="nav('users', this)"><i class="fas fa-users"></i>Users</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "305101036814",
            appId: "1:305101036814:web:658c16053f3e790f1352ac"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function nav(id, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function toast(t, m, i) { Swal.fire({ title: t, text: m, icon: i, background: '#111', color: '#fff' }); }

        function sendNotif() {
            let msg = document.getElementById('notifMsg').value;
            if(!msg) return toast("Oops!", "মেসেজ লিখুন!", "warning");
            db.ref('notifications').set({ message: msg, timestamp: Date.now() }).then(() => {
                toast("Successful!", "ঘোষণা পাঠানো হয়েছে! ✅", "success");
                document.getElementById('notifMsg').value = "";
            });
        }

        function postMatch() {
            const m = {
                matchNo: document.getElementById('mNo').value,
                name: document.getElementById('mTitle').value,
                mode: document.getElementById('mType').value,
                maxSlots: document.getElementById('mMaxSlots').value || 48,
                joinedCount: 0,
                entry: document.getElementById('mEntry').value,
                perKill: document.getElementById('mKill').value,
                prize: document.getElementById('mPrize').value,
                rules: document.getElementById('mRules').value || "Default Rules",
                startTime: document.getElementById('mTime').value,
                roomId: "Pending", roomPass: "Pending"
            };
            if(!m.matchNo || !m.name || !m.startTime) return toast("Error", "সব তথ্য দিন", "error");
            db.ref('matches').push(m).then(() => {
                toast("Published!", "ম্যাচ তৈরি হয়েছে! ✅", "success");
                document.getElementById('mNo').value = ""; document.getElementById('mTitle').value = "";
            });
        }

        db.ref('matches').on('value', s => {
            let h = "";
            s.forEach(c => {
                let m = c.val();
                let matchId = c.key;
                let status = m.joinedCount >= m.maxSlots ? "FULL" : "Available";
                
                h += `<div class="item">
                    <button class="del-btn" onclick="db.ref('matches/${matchId}').remove()">DELETE</button>
                    <b style="color:var(--p);">#${m.matchNo} ${m.name}</b> 
                    <span class="slot-tag">${m.joinedCount}/${m.maxSlots} ${status}</span><br>
                    <small>${m.startTime} | ${m.mode}</small>
                    
                    <span id="timer_${matchId}" class="timer">Calculating...</span>

                    <button class="btn" style="background:#222; color:var(--p); margin-top:8px; border:1px solid var(--p);" onclick="togglePlayers('${matchId}')">VIEW JOINED PLAYERS (UID)</button>
                    <div id="pBox_${matchId}" class="player-list-box">Loading...</div>

                    <div class="room-box">
                        <span class="room-label">Room ID / Pass Update</span>
                        <input type="text" id="rid_${matchId}" value="${m.roomId}" placeholder="Room ID">
                        <input type="text" id="rps_${matchId}" value="${m.roomPass}" placeholder="Room Password">
                        <button class="btn" style="background:var(--blue); height:35px;" onclick="pushRoom('${matchId}')">UPDATE ID/PASS</button>
                    </div>
                </div>`;
                startTimer(m.startTime, `timer_${matchId}`);
            });
            document.getElementById('mList').innerHTML = h || "No Active Matches.";
        });

        function startTimer(time, elId) {
            setInterval(() => {
                let dest = new Date(time).getTime();
                let now = new Date().getTime();
                let diff = dest - now;
                let el = document.getElementById(elId);
                if(!el) return;
                if(diff <= 0) { el.innerHTML = "MATCH STARTED"; el.style.color = "var(--red)"; }
                else {
                    let h = Math.floor(diff/(1000*60*60));
                    let m = Math.floor((diff%(1000*60*60))/(1000*60));
                    let s = Math.floor((diff%(1000*60))/1000);
                    el.innerHTML = `Starts In: ${h}h ${m}m ${s}s`;
                }
            }, 1000);
        }

        function togglePlayers(mid) {
            let box = document.getElementById(`pBox_${mid}`);
            if(box.style.display === "block") { box.style.display = "none"; return; }
            box.style.display = "block";
            db.ref('participants/' + mid).on('value', snap => {
                let list = "";
                if(!snap.exists()) list = "<div style='font-size:10px; color:#666;'>No players joined yet.</div>";
                snap.forEach(p => {
                    let d = p.val();
                    list += `<div class="p-row"><span>${d.ign}</span> <span style="color:var(--blue)">UID: ${d.uid}</span></div>`;
                });
                box.innerHTML = list;
            });
        }

        function pushRoom(id) {
            db.ref('matches/' + id).update({
                roomId: document.getElementById('rid_'+id).value,
                roomPass: document.getElementById('rps_'+id).value
            }).then(() => toast("Sent!", "ID/Pass আপডেট হয়েছে! ✅", "success"));
        }

        // --- Result & User Management (Same as previous, updated with Mode) ---
        function setResult() {
            let no = document.getElementById('resMNo').value;
            let mode = document.getElementById('resMode').value;
            let win = document.getElementById('resWinner').value;
            let kill = document.getElementById('resKillCount').value;
            let amt = document.getElementById('resWinAmt').value;
            if(!no || !win) return toast("Warning!", "সবগুলো ঘর পূরণ করুন", "warning");
            db.ref('results').push({ matchNo: no, mode: mode, winner: win, kills: kill, amount: amt }).then(() => {
                toast("Published!", "রেজাল্ট পাবলিশ হয়েছে! ✅", "success");
            });
        }

        db.ref('results').on('value', s => {
            let h = "";
            s.forEach(c => {
                let r = c.val();
                h += `<div class="item" style="border-left-color: gold;">
                    <button class="del-btn" onclick="db.ref('results/${c.key}').remove()">DELETE</button>
                    <b>Match #${r.matchNo} [${r.mode}] Result</b><br>
                    <small style="color:gold;">Winners: ${r.winner}</small>
                </div>`;
            });
            document.getElementById('rList').innerHTML = h || "No Results.";
        });

        // Search & User Edit
        function searchUser() {
            let q = document.getElementById('uSearch').value.toLowerCase();
            document.querySelectorAll('.u-item').forEach(i => {
                i.style.display = i.getAttribute('data-name').includes(q) ? "flex" : "none";
            });
        }

        function renderUsers(users) {
            let h = "";
            for (let uid in users) {
                let u = users[uid];
                h += `<div class="u-item" data-name="${u.ign ? u.ign.toLowerCase() : ''}">
                    <div class="u-info"><b>${u.ign || 'No Name'}</b><p>Bal: ${u.winning || 0} Tk</p></div>
                    <button class="btn" style="width:70px; font-size:10px; padding:8px;" onclick="editUser('${uid}')">EDIT</button>
                </div>`;
            }
            document.getElementById('uList').innerHTML = h || "No Users.";
        }

        function editUser(uid) {
            let u = usersData[uid];
            Swal.fire({
                title: `Edit ${u.ign}`,
                html: `<input id="sw-bal" type="number" value="${u.winning || 0}">`,
                confirmButtonText: 'Update'
            }).then(res => {
                if(res.isConfirmed) db.ref('users/' + uid).update({ winning: parseInt(document.getElementById('sw-bal').value) });
            });
        }

        db.ref('payments').on('value', s => {
            let h = "";
            s.forEach(c => {
                let p = c.val();
                h += `<div class="item"><b>Amount: ${p.amount} Tk</b><br><small>User: ${p.uid}</small>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <a href="${p.ssUrl}" target="_blank" style="background:var(--blue); color:#000; padding:8px; border-radius:8px; font-size:11px; text-decoration:none; font-weight:bold; flex:1; text-align:center;">VIEW SS</a>
                        <button class="btn" style="flex:1;" onclick="approvePay('${p.uid}', ${p.amount}, '${c.key}')">APPROVE</button>
                    </div></div>`;
            });
            document.getElementById('pList').innerHTML = h || "No Requests.";
        });

        function approvePay(uid, amt, pid) {
            db.ref('users/' + uid).once('value', s => {
                let cur = parseInt(s.val().winning || 0);
                db.ref('users/' + uid).update({ winning: cur + parseInt(amt) });
                db.ref('payments/' + pid).remove();
                toast("Success", "Balance added!", "success");
            });
        }
    </script>
</body>
</html>
