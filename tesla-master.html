<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --r: #ff4444; --y: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding: 20px; padding-bottom: 100px; }
        h2 { font-family: 'Orbitron'; text-align: center; color: var(--p); margin-bottom: 25px; letter-spacing: 2px; }
        
        .sec { background: var(--c); padding: 20px; border-radius: 20px; border: 1px solid #222; display: none; animation: fadeIn 0.3s ease; }
        .sec.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--p); margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 12px; box-sizing: border-box; outline: none; font-family: 'Poppins'; }
        input:focus { border-color: var(--p); }

        .btn-action { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-action:active { transform: scale(0.98); }
        .btn-del { background: var(--r); color: #fff; padding: 8px 12px; border-radius: 8px; border: none; font-size: 11px; cursor: pointer; }

        .req-card { background: #000; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; position: relative; border-left: 4px solid var(--p); }
        .req-card.withdraw { border-left-color: var(--y); }
        .req-info p { margin: 3px 0; font-size: 13px; color: #ccc; }
        .req-amount { font-family: 'Orbitron'; color: var(--p); font-size: 18px; display: block; margin-top: 5px; }

        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 4px; }

        .r-card { background: #000; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        .player-row { font-size: 11px; background: #1a1a1a; padding: 10px; margin: 8px 0; border-radius: 10px; border-left: 3px solid var(--p); color: #ddd; }
        .img-preview { width: 80px; height: 45px; object-fit: cover; border-radius: 5px; margin-right: 10px; border: 1px solid #333; }
        .tab-btn { background: #222; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; font-family: 'Orbitron'; font-size: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--p); color: #000; border-color: var(--p); }
    </style>
</head>
<body>

    <h2>TESLA MASTER</h2>

    <div id="slider" class="sec active">
        <h3>SLIDER MANAGEMENT</h3>
        <input type="file" id="slideFile" accept="image/*">
        <button class="btn-action" onclick="uploadSlider()">ADD NEW SLIDE</button>
        <div id="currentSliders" style="margin-top:20px;"></div>

        <h3 style="margin-top:30px;">NOTICE BOARD</h3>
        <textarea id="noticeText" rows="2" placeholder="Write notice here..."></textarea>
        <button class="btn-action" style="background: var(--y);" onclick="uploadNotice()">UPDATE NOTICE</button>
    </div>

    <div id="match" class="sec">
        <h3>CREATE TOURNAMENT</h3>
        <input id="mNo" placeholder="Match No (#01)">
        <input id="mName" placeholder="Match Name">
        <select id="mMode">
            <option value="SOLO">SOLO</option>
            <option value="DUO">DUO</option>
            <option value="SQUAD">SQUAD</option>
        </select>
        <div style="display: flex; gap: 8px;">
            <input id="mFee" type="number" placeholder="Entry Fee">
            <input id="mPrize" type="number" placeholder="Total Prize">
        </div>
        <input id="mTime" type="datetime-local" placeholder="Match Time">
        <input id="mTotalSlots" type="number" placeholder="Total Slots (48)">
        <textarea id="mRules" rows="2" placeholder="Rules..."></textarea>
        <button class="btn-action" onclick="publishMatch()">PUBLISH MATCH</button>
        
        <h4 style="margin-top: 30px; color: var(--p);">LIVE MATCHES</h4>
        <div id="liveMatchList"></div>
    </div>

    <div id="result" class="sec">
        <h3>POST MATCH RESULT</h3>
        <input id="resMatchNo" placeholder="Match No (e.g. 01)">
        <input id="resName" placeholder="Tournament Name">
        <select id="resMode">
            <option value="SOLO">SOLO</option>
            <option value="DUO">DUO</option>
            <option value="SQUAD">SQUAD</option>
        </select>
        <hr border="1" color="#222">
        <input id="winUid" placeholder="Winner UID">
        <input id="winPrize" type="number" placeholder="Winner Prize (TK)">
        <input id="runUid" placeholder="Runner-up UID (Optional)">
        <input id="runPrize" type="number" placeholder="Runner Prize (TK)">
        <input id="totalKills" type="number" placeholder="Total Kills">
        
        <button class="btn-action" style="background:var(--y)" onclick="sendResult()">PUBLISH & PAY WINNERS</button>
    </div>

    <div id="requests" class="sec">
        <h3>FINANCIAL REQUESTS</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button id="tabDep" class="tab-btn active" onclick="toggleReq('dep')">DEPOSITS</button>
            <button id="tabWit" class="tab-btn" onclick="toggleReq('wit')">WITHDRAWS</button>
        </div>
        <div id="depositBox"><div id="depList"></div></div>
        <div id="withdrawBox" style="display:none;"><div id="witList"></div></div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="showSec('slider', this)"><i class="fas fa-images"></i>Slider</div>
        <div class="n-i" onclick="showSec('match', this)"><i class="fas fa-gamepad"></i>Matches</div>
        <div class="n-i" onclick="showSec('result', this)"><i class="fas fa-trophy"></i>Results</div>
        <div class="n-i" onclick="showSec('requests', this)"><i class="fas fa-wallet"></i>Requests</div>
    </div>

    <script>
        // আপনার নতুন আপডেট করা কনফিগ এখানে বসানো হয়েছে
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSec(id, btn) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function toggleReq(type) {
            document.getElementById('depositBox').style.display = type==='dep'?'block':'none';
            document.getElementById('withdrawBox').style.display = type==='wit'?'block':'none';
            document.getElementById('tabDep').classList.toggle('active', type==='dep');
            document.getElementById('tabWit').classList.toggle('active', type==='wit');
        }

        // --- SLIDER & NOTICE ---
        async function uploadSlider() {
            const file = document.getElementById('slideFile').files[0];
            if(!file) return Swal.fire("Error", "Select Image", "error");
            const fd = new FormData(); fd.append('image', file);
            const res = await fetch('https://api.imgbb.com/1/upload?key=bb6ae5282e75af49c1e446d17733e498', {method:'POST', body:fd});
            const data = await res.json();
            if(data.success) {
                db.ref('settings/sliders').push(data.data.url).then(() => Swal.fire("Success", "Slide Added", "success"));
            }
        }
        db.ref('settings/sliders').on('value', snap => {
            let h = ""; snap.forEach(c => { h += `<div style="display:flex; align-items:center; margin-bottom:10px;"><img src="${c.val()}" class="img-preview"> <button class="btn-del" onclick="db.ref('settings/sliders/${c.key}').remove()">X</button></div>`; });
            document.getElementById('currentSliders').innerHTML = h;
        });
        function uploadNotice() {
            db.ref('settings/notice').set(document.getElementById('noticeText').value).then(() => Swal.fire("Success", "Notice Updated", "success"));
        }

        // --- MATCHES ---
        function publishMatch() {
            const m = { matchNo: document.getElementById('mNo').value, name: document.getElementById('mName').value, mode: document.getElementById('mMode').value, entryFee: document.getElementById('mFee').value, totalPrize: document.getElementById('mPrize').value, startTime: document.getElementById('mTime').value, totalSlots: document.getElementById('mTotalSlots').value, rules: document.getElementById('mRules').value, joinedCount: 0 };
            db.ref('matches').push(m).then(() => { Swal.fire("Success", "Match Live", "success"); });
        }
        db.ref('matches').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let m = c.val();
                h += `<div class="r-card">
                    <p><b>#${m.matchNo}</b> - ${m.name}</p>
                    <button class="btn-action" style="padding:5px; font-size:10px; width:auto;" onclick="updateRoom('${c.key}')">Set Room ID</button>
                    <button class="btn-del" onclick="db.ref('matches/${c.key}').remove()">Delete</button>
                    <div id="plist-${c.key}" style="margin-top:10px;"></div>
                </div>`;
                db.ref('match_joins/'+c.key).on('value', ps => {
                    let ph = ""; ps.forEach(pc => {
                        let players = pc.val().players || [];
                        players.forEach(p => ph += `<div class="player-row">Name: ${p.name} | UID: ${p.gameUid}</div>`);
                    });
                    document.getElementById('plist-'+c.key).innerHTML = ph || "No players";
                });
            });
            document.getElementById('liveMatchList').innerHTML = h;
        });

        // --- ROOM ID UPDATE ---
        function updateRoom(key) {
            Swal.fire({
                title: 'Room Details',
                html: `<input id="rid" class="swal2-input" placeholder="Room ID"><input id="rpass" class="swal2-input" placeholder="Password">`,
                preConfirm: () => [document.getElementById('rid').value, document.getElementById('rpass').value]
            }).then(r => {
                if(r.value && r.value[0]) db.ref('matches/'+key).update({ roomId: r.value[0], roomPass: r.value[1] });
            });
        }

        // --- RESULTS (PAYMENT INCLUDED) ---
        async function sendResult() {
            const mNo = document.getElementById('resMatchNo').value, mName = document.getElementById('resName').value, mMode = document.getElementById('resMode').value;
            const wUid = document.getElementById('winUid').value, wPrize = parseInt(document.getElementById('winPrize').value);
            const rUid = document.getElementById('runUid').value, rPrize = parseInt(document.getElementById('runPrize').value || 0);
            const kills = document.getElementById('totalKills').value;

            if(!mNo || !wUid || !wPrize) return Swal.fire("Error", "Fill Winner Info", "error");

            const wSnap = await db.ref('users/'+wUid).once('value');
            if(wSnap.exists()){
                let userData = wSnap.val();
                await db.ref('users/'+wUid).update({ deposit: (userData.deposit || 0) + wPrize, winning: (userData.winning || 0) + wPrize });
                
                if(rUid && rPrize > 0){
                    const rSnap = await db.ref('users/'+rUid).once('value');
                    if(rSnap.exists()){
                        let runData = rSnap.val();
                        await db.ref('users/'+rUid).update({ deposit: (runData.deposit || 0) + rPrize, winning: (runData.winning || 0) + rPrize });
                    }
                }

                db.ref('results').push({ matchNo: mNo, name: mName, mode: mMode, winner: userData.name, winPrize: wPrize, runnerUp: rUid ? "Player Found" : "N/A", runnerPrize: rPrize, totalKills: kills });
                Swal.fire("Success", "Result Posted & Payment Sent", "success");
            } else {
                Swal.fire("Error", "Winner UID not found", "error");
            }
        }

        // --- DEPOSITS ---
        db.ref('payments').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let d = c.val(); if(d.status === "Pending"){
                    h += `<div class="req-card">
                        <p>User UID: ${d.uid}</p>
                        <span class="req-amount">TK ${d.amount}</span>
                        <a href="${d.ssUrl}" target="_blank" style="color:var(--y)">[View Screenshot]</a>
                        <button class="btn-action" onclick="approveDep('${c.key}','${d.uid}',${d.amount})">Approve</button>
                    </div>`;
                }
            });
            document.getElementById('depList').innerHTML = h || "No pending deposits";
        });

        function approveDep(key, uid, amt) {
            db.ref('users/'+uid).once('value', s => {
                let current = (s.val() && s.val().deposit) || 0;
                db.ref('users/'+uid).update({ deposit: current + parseInt(amt) });
                db.ref('payments/'+key).update({ status: "Approved" });
                Swal.fire("Approved", "Balance Added", "success");
            });
        }

        // --- WITHDRAWS ---
        db.ref('withdrawRequests').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let w = c.val(); if(w.status === "Pending"){
                    h += `<div class="req-card withdraw">
                        <p>UID: ${w.uid}</p><p>Number: ${w.number}</p>
                        <span class="req-amount">TK ${w.amount}</span>
                        <button class="btn-action" style="background:var(--r); color:#fff;" onclick="db.ref('withdrawRequests/${c.key}').update({status:'Paid'})">Mark Paid</button>
                    </div>`;
                }
            });
            document.getElementById('witList').innerHTML = h || "No pending withdraws";
        });
    </script>
</body>
</html>
