<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin - Ultimate Edition</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; --red: #ff3333; --blue: #00c2ff; --yellow: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .header { padding: 15px; text-align: center; background: #000; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 1000; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); text-shadow: 0 0 10px var(--p); font-size: 18px; }
        .sec { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .sec.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        .card { background: var(--c); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #222; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h3 { color: var(--p); font-family: 'Orbitron'; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; outline: none; box-sizing: border-box; font-size: 13px; }
        .btn { background: var(--p); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; font-family: 'Orbitron'; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--p); position: relative; }
        .win-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header"><div class="title">TESLA MASTER ADMIN</div></div>

    <div id="matches" class="sec active">
        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Create Tournament</h3>
            <input type="number" id="mNo" placeholder="Match No">
            <input type="text" id="mTitle" placeholder="Match Name">
            <input type="datetime-local" id="mTime">
            <button class="btn" onclick="postMatch()">Publish Match</button>
        </div>
        <div id="mList">Loading Matches...</div>
    </div>

    <div id="payments" class="sec">
        <h3><i class="fas fa-money-bill-wave"></i> Deposit Requests</h3>
        <div id="pList">Loading...</div>
        <h3 style="margin-top:30px;"><i class="fas fa-university"></i> Withdraw Requests</h3>
        <div id="wList">Loading...</div>
    </div>

    <div id="results" class="sec">
        <div class="card">
            <h3><i class="fas fa-trophy"></i> Declare Result</h3>
            <input type="number" id="resMNo" placeholder="Match No">
            <select id="resMode" onchange="updateFields()">
                <option value="BR Solo">BR Solo</option>
                <option value="Lone Wolf 1vs1">Lone Wolf 1vs1</option>
                <option value="BR Duo">BR Duo</option>
                <option value="Lone Wolf 2vs2">Lone Wolf 2vs2</option>
                <option value="BR Squad">BR Squad</option>
                <option value="Clash Squad">Clash Squad</option>
            </select>
            
            <div id="winnerInputs">
                <div class="win-row">
                    <input type="text" id="wName1" placeholder="Winner 1 Name">
                    <input type="number" id="wKill1" placeholder="Kill">
                    <input type="number" id="wAmt1" placeholder="Tk">
                </div>
                <div id="extraWinners" style="display:none;">
                    <div class="win-row"><input type="text" id="wName2" placeholder="Winner 2 Name"><input type="number" id="wKill2" placeholder="Kill"><input type="number" id="wAmt2" placeholder="Tk"></div>
                    <div id="squadFields" style="display:none;">
                        <div class="win-row"><input type="text" id="wName3" placeholder="Winner 3 Name"><input type="number" id="wKill3" placeholder="Kill"><input type="number" id="wAmt3" placeholder="Tk"></div>
                        <div class="win-row"><input type="text" id="wName4" placeholder="Winner 4 Name"><input type="number" id="wKill4" placeholder="Kill"><input type="number" id="wAmt4" placeholder="Tk"></div>
                    </div>
                </div>
            </div>

            <button class="btn" style="background:gold;" onclick="setResult()">Submit Result</button>
        </div>
        <div id="rList"></div>
    </div>

    <div id="users" class="sec">
        <input type="text" id="uSearch" placeholder="Search User..." onkeyup="searchUser()">
        <div id="uList">Loading Users...</div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="nav('matches', this)"><i class="fas fa-gamepad"></i>Matches</div>
        <div class="n-i" onclick="nav('payments', this)"><i class="fas fa-money-bill-wave"></i>Payments</div>
        <div class="n-i" onclick="nav('results', this)"><i class="fas fa-poll"></i>Results</div>
        <div class="n-i" onclick="nav('users', this)"><i class="fas fa-users"></i>Users</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "305101036814",
            appId: "1:305101036814:web:658c16053f3e790f1352ac"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function nav(id, el) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        // মোড অনুযায়ী ফিল্ড দেখানো/লুকানো
        function updateFields() {
            let m = document.getElementById('resMode').value;
            let extra = document.getElementById('extraWinners');
            let squad = document.getElementById('squadFields');
            
            if(m.includes('Solo') || m.includes('1vs1')) { extra.style.display = "none"; }
            else if(m.includes('Duo') || m.includes('2vs2')) { extra.style.display = "block"; squad.style.display = "none"; }
            else { extra.style.display = "block"; squad.style.display = "block"; }
        }

        function setResult() {
            let no = document.getElementById('resMNo').value;
            let mode = document.getElementById('resMode').value;
            let winners = [];
            
            // ডাটা সংগ্রহ
            for(let i=1; i<=4; i++) {
                let name = document.getElementById('wName'+i).value;
                if(name) {
                    winners.push({
                        name: name,
                        kills: document.getElementById('wKill'+i).value || 0,
                        amount: document.getElementById('wAmt'+i).value || 0
                    });
                }
            }

            if(!no || winners.length === 0) return Swal.fire("Error", "কমপক্ষে একজন ইউজারের নাম দিন", "error");

            db.ref('results').push({ matchNo: no, mode: mode, players: winners, time: Date.now() })
            .then(() => { Swal.fire("Success", "রেজাল্ট পাবলিশ হয়েছে!", "success"); });
        }

        // --- আগের লজিকগুলো অক্ষুণ্ণ রাখা হয়েছে ---
        db.ref('payments').on('value', s => {
            let h = "";
            s.forEach(c => {
                let p = c.val();
                if(p.status === 'Pending') {
                    h += `<div class="item" style="border-left-color: var(--p);">
                        <b>Amount: ${p.amount} TK</b><br><small>User: ${p.uid}</small>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <a href="${p.ssUrl}" target="_blank" class="btn" style="background:var(--blue); flex:1;">VIEW SS</a>
                            <button class="btn" style="flex:1;" onclick="approvePay('${p.uid}', ${p.amount}, '${c.key}')">APPROVE</button>
                        </div></div>`;
                }
            });
            document.getElementById('pList').innerHTML = h || "No pending deposits.";
        });

        function approvePay(uid, amt, pid) {
            db.ref('users/' + uid).once('value', s => {
                let cur = parseInt(s.val().deposit || 0);
                db.ref('users/' + uid).update({ deposit: cur + parseInt(amt) });
                db.ref('payments/' + pid).update({ status: 'Approved' });
                Swal.fire("Success", "Balance added!", "success");
            });
        }

        db.ref('withdrawRequests').on('value', s => {
            let h = "";
            s.forEach(c => {
                let w = c.val();
                if(w.status === 'Pending') {
                    h += `<div class="item" style="border-left-color: var(--yellow);">
                        <b>${w.amount} TK - ${w.method}</b><br><small>Num: ${w.number}</small>
                        <button class="btn" style="margin-top:10px;" onclick="approveWit('${c.key}')">MARK AS PAID</button>
                    </div>`;
                }
            });
            document.getElementById('wList').innerHTML = h || "No pending withdrawals.";
        });

        function approveWit(key) {
            db.ref('withdrawRequests/' + key).update({ status: 'Completed' });
            Swal.fire("Success", "Paid!", "success");
        }

        function postMatch() {
            let mNo = document.getElementById('mNo').value;
            let title = document.getElementById('mTitle').value;
            if(!mNo || !title) return;
            db.ref('matches').push({ matchNo: mNo, name: title, startTime: document.getElementById('mTime').value, joinedCount: 0, maxSlots: 48, roomId: "Pending", roomPass: "Pending" });
            Swal.fire("Success", "Match Published", "success");
        }

        db.ref('matches').on('value', s => {
            let h = "";
            s.forEach(c => {
                let m = c.val();
                h += `<div class="item"><b>#${m.matchNo} ${m.name}</b><br><small>${m.startTime}</small></div>`;
            });
            document.getElementById('mList').innerHTML = h;
        });
    </script>
</body>
</html>
