<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p: #00ff00; --b: #080808; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--b); color: #fff; padding: 15px; margin: 0; }
        .card { background: #121212; padding: 18px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h3 { color: var(--p); font-size: 14px; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--p); color: #000; width: 100%; padding: 14px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--p); position: relative; }
        .del-btn { background: #ff3333; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; float: right; font-size: 11px; }
        .room-area { background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="text-align:center;">TESLA <span style="color:var(--p);">MASTER CONTROL</span></h2>

    <div class="card" style="border-top: 3px solid cyan;">
        <h3>🎨 App Theme Settings</h3>
        <input type="color" id="appTheme" value="#00ff00">
        <button class="btn" style="background:cyan" onclick="saveTheme()">Apply Theme</button>
    </div>

    <div class="card" style="border-top: 3px solid #00c2ff;">
        <h3>👤 User Balance & Stats</h3>
        <input type="text" id="uUid" placeholder="Paste User UID">
        <input type="number" id="uBal" placeholder="Set Main Balance (TK)">
        <input type="number" id="uPlayed" placeholder="Set Total Matches Played">
        <button class="btn" style="background:#00c2ff" onclick="updateUser()">Update User</button>
    </div>

    <div class="card" style="border-top: 3px solid #ff4444;">
        <h3>🚀 Post New Tournament</h3>
        <input type="number" id="mNo" placeholder="Match No (Ex: 01)">
        <input type="text" id="mTitle" placeholder="Match Name">
        <div style="display:flex; gap:10px;">
            <input type="number" id="mEntry" placeholder="Entry Fee">
            <input type="number" id="mPrize" placeholder="Total Prize">
        </div>
        <button class="btn" onclick="postMatch()">Go Live</button>
    </div>

    <div class="card" style="border-top: 3px solid #a832ad;">
        <h3>💰 Payment Requests</h3>
        <div id="pList">Loading...</div>
    </div>

    <div class="card">
        <h3>📋 Live Matches & Room ID</h3>
        <div id="mList">Loading...</div>
    </div>

    <script>
        const conf = { databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        // থিম সেভ
        function saveTheme() {
            db.ref('settings/theme').set({ color: document.getElementById('appTheme').value });
            alert("Theme Updated!");
        }

        // ইউজার আপডেট
        function updateUser() {
            let uid = document.getElementById('uUid').value;
            let bal = document.getElementById('uBal').value;
            let played = document.getElementById('uPlayed').value;
            if(!uid) return alert("UID দিন!");
            db.ref('users/' + uid).update({ winning: parseInt(bal), played: parseInt(played) })
            .then(() => alert("User Updated!"));
        }

        // ম্যাচ পাবলিশ
        function postMatch() {
            const data = {
                matchNo: document.getElementById('mNo').value,
                name: document.getElementById('mTitle').value,
                entry: document.getElementById('mEntry').value,
                prize: document.getElementById('mPrize').value,
                roomId: "Pending", roomPass: "Pending"
            };
            db.ref('matches').push(data).then(() => { alert("Match Live! ✅"); location.reload(); });
        }

        // রুম আইডি আপডেট
        function updateRoom(id) {
            db.ref('matches/' + id).update({
                roomId: document.getElementById('rid_'+id).value,
                roomPass: document.getElementById('rps_'+id).value
            }).then(() => alert("Room ID/Pass Updated!"));
        }

        // পেমেন্ট লিস্ট
        db.ref('payments').on('value', s => {
            let h = "";
            s.forEach(c => {
                let p = c.val();
                h += `<div class="item"><b>${p.type}</b>: ${p.amount}TK<br>UID: ${p.uid}<br>
                <button class="btn" style="width:48%; font-size:10px; background:cyan; margin-top:5px;" onclick="approvePay('${p.uid}', ${p.amount}, '${c.key}')">Approve</button>
                <button class="del-btn" onclick="db.ref('payments/${c.key}').remove()">Reject</button></div>`;
            });
            document.getElementById('pList').innerHTML = h || "No Requests.";
        });

        function approvePay(uid, amt, pid) {
            db.ref('users/' + uid).once('value', s => {
                let total = parseInt(s.val().winning || 0) + amt;
                db.ref('users/' + uid).update({ winning: total });
                db.ref('payments/' + pid).remove();
                alert("Payment Approved!");
            });
        }

        // ম্যাচ লিস্ট ও ডিলিট
        db.ref('matches').on('value', s => {
            let h = "";
            s.forEach(c => {
                let m = c.val();
                h += `<div class="item">
                    <button class="del-btn" onclick="deleteMatch('${c.key}')">DELETE</button>
                    <b>#${m.matchNo} ${m.name}</b>
                    <div class="room-area">
                        <input type="text" id="rid_${c.key}" placeholder="Room ID" value="${m.roomId}">
                        <input type="text" id="rps_${c.key}" placeholder="Room Pass" value="${m.roomPass}">
                        <button class="btn" style="background:gold; font-size:11px; padding:8px;" onclick="updateRoom('${c.key}')">Push ID/PASS</button>
                    </div>
                </div>`;
            });
            document.getElementById('mList').innerHTML = h || "No Matches.";
        });

        function deleteMatch(id) { if(confirm("Delete Match?")) db.ref('matches/' + id).remove(); }
    </script>
</body>
</html>
