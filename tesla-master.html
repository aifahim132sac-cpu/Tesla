<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #111; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding: 20px; padding-bottom: 100px; }
        h2 { font-family: 'Orbitron'; text-align: center; color: var(--p); margin-bottom: 25px; font-size: 20px; }
        
        /* Sections */
        .sec { background: var(--c); padding: 20px; border-radius: 20px; border: 1px solid #222; display: none; animation: fadeIn 0.3s ease; }
        .sec.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* Inputs */
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--p); }
        .btn-action { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 12px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #222; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 4px; }

        /* Request Cards */
        .r-card { background: #000; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h2>TESLA ADMIN</h2>

    <div id="slider" class="sec active">
        <h3 style="font-family: Orbitron; font-size: 14px;">Slider Control</h3>
        <input type="file" id="slideFile" accept="image/*">
        <button class="btn-action" id="uploadBtn" onclick="uploadSlider()">UPLOAD TO SLIDER</button>
    </div>

    <div id="match" class="sec">
        <h3 style="font-family: Orbitron; font-size: 14px;">Create Match</h3>
        <input id="mNo" placeholder="Match No (#01)">
        <input id="mName" placeholder="Match Name">
        <select id="mMode">
            <option value="BR Solo">BR Solo</option>
            <option value="BR Duo">BR Duo</option>
            <option value="BR Squad">BR Squad</option>
            <option value="Clash Squad">Clash Squad</option>
            <option value="Lone Wolf 1vs1">Lone Wolf 1vs1</option>
            <option value="Lone Wolf 2vs2">Lone Wolf 2vs2</option>
        </select>
        <div style="display: flex; gap: 10px;">
            <input id="mFee" type="number" placeholder="Entry Fee">
            <input id="mPrize" type="number" placeholder="Total Prize">
        </div>
        <input id="mTime" placeholder="Date & Time (e.g. 10 PM)">
        <button class="btn-action" onclick="publishMatch()">PUBLISH MATCH</button>
    </div>

    <div id="result" class="sec">
        <h3 style="font-family: Orbitron; font-size: 14px;">Result & Pay</h3>
        <input id="resMatchNo" placeholder="Match No">
        <input id="targetUid" placeholder="Player UID">
        <input id="targetKill" type="number" placeholder="Kills">
        <input id="winAmount" type="number" placeholder="Win TK">
        <button class="btn-action" style="background: #ffcc00;" onclick="sendResult()">SEND MONEY</button>
    </div>

    <div id="requests" class="sec">
        <h3 style="font-family: Orbitron; font-size: 14px;">User Requests</h3>
        <div id="depList">Loading Deposits...</div>
        <hr style="border-color: #222; margin: 20px 0;">
        <div id="witList">Loading Withdraws...</div>
    </div>

    <div class="nav">
        <div class="n-i active" onclick="showSec('slider', this)"><i class="fas fa-images"></i>Slider</div>
        <div class="n-i" onclick="showSec('match', this)"><i class="fas fa-gamepad"></i>Match</div>
        <div class="n-i" onclick="showSec('result', this)"><i class="fas fa-trophy"></i>Result</div>
        <div class="n-i" onclick="showSec('requests', this)"><i class="fas fa-wallet"></i>Requests</div>
    </div>

    <script>
        const firebaseConfig = { 
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSec(id, btn) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.n-i').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // --- স্লাইডার আপলোড (Imgbb) ---
        async function uploadSlider() {
            const file = document.getElementById('slideFile').files[0];
            if(!file) return Swal.fire("Error", "Select Image", "error");
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "Uploading...";
            const formData = new FormData();
            formData.append('image', file);
            const res = await fetch('https://api.imgbb.com/1/upload?key=bb6ae5282e75af49c1e446d17733e498', {method:'POST', body:formData});
            const data = await res.json();
            if(data.success) {
                db.ref('settings/sliders').push(data.data.url).then(() => {
                    Swal.fire("Success", "Slider Updated", "success");
                    btn.innerText = "UPLOAD TO SLIDER";
                });
            }
        }

        // --- ম্যাচ পাবলিশ ---
        function publishMatch() {
            const m = {
                matchNo: document.getElementById('mNo').value,
                name: document.getElementById('mName').value,
                mode: document.getElementById('mMode').value,
                entryFee: document.getElementById('mFee').value,
                totalPrize: document.getElementById('mPrize').value,
                startTime: document.getElementById('mTime').value,
                status: "Open"
            };
            db.ref('matches').push(m).then(() => {
                Swal.fire("Success", "Match Live!", "success");
                document.querySelectorAll('#match input').forEach(i => i.value = "");
            });
        }

        // --- রেজাল্ট ও অটো-পেমেন্ট ---
        function sendResult() {
            const uid = document.getElementById('targetUid').value;
            const amt = parseInt(document.getElementById('winAmount').value);
            const kill = document.getElementById('targetKill').value;
            const mNo = document.getElementById('resMatchNo').value;

            db.ref('users/' + uid).once('value', s => {
                if(!s.exists()) return Swal.fire("Error", "User not found", "error");
                const u = s.val();
                db.ref('users/' + uid).update({
                    deposit: (u.deposit || 0) + amt,
                    winning: (u.winning || 0) + amt
                }).then(() => {
                    db.ref('results').push({ name: u.name, kills: kill, amount: amt, matchNo: mNo });
                    Swal.fire("Paid", "Money added & Result posted!", "success");
                });
            });
        }

        // --- ডিপোজিট লোড ---
        db.ref('requests/deposits').on('value', snap => {
            let h = "<h4 style='color:#00ff00'>Pending Deposits</h4>";
            snap.forEach(c => {
                let d = c.val();
                h += `<div class="r-card">
                    <p style="font-size:12px; margin:0">UID: ${d.uid}</p>
                    <p style="font-size:14px; font-weight:bold; margin:5px 0">TK: ${d.amount} | Num: ${d.phone}</p>
                    <a href="${d.ss}" target="_blank" style="color:var(--p); font-size:12px">View Screenshot</a><br>
                    <button class="btn-action" style="padding:8px; font-size:11px" onclick="approveDep('${c.key}', '${d.uid}', ${d.amount})">APPROVE</button>
                </div>`;
            });
            document.getElementById('depList').innerHTML = h || "No pending deposits";
        });

        function approveDep(key, uid, amt) {
            db.ref('users/'+uid+'/deposit').transaction(c => (c||0)+parseInt(amt)).then(() => {
                db.ref('requests/deposits/'+key).remove();
                Swal.fire("Done", "Approved!", "success");
            });
        }
    </script>
</body>
</html>
