<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff00; --b: #080808; --c: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; padding: 15px; margin: 0; }
        .card { background: var(--c); padding: 18px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h3 { color: var(--p); font-family: 'Orbitron'; font-size: 14px; text-transform: uppercase; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { background: var(--p); color: #000; width: 100%; padding: 14px; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; text-transform: uppercase; font-family: 'Orbitron'; }
        .item { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 5px solid var(--p); position: relative; }
        .del-btn { background: #ff3333; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; float: right; font-size: 11px; }
        .room-area { background: #222; padding: 10px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2 style="text-align:center; font-family: 'Orbitron';">TESLA <span style="color:var(--p);">MASTER</span></h2>

    <div class="card" style="border-top: 3px solid cyan;">
        <h3>🎨 App Theme Color</h3>
        <input type="color" id="appTheme" value="#00ff00">
        <button class="btn" style="background:cyan" onclick="saveTheme()">Apply Theme</button>
    </div>

    <div class="card" style="border-top: 3px solid #00c2ff;">
        <h3>👤 User Balance & Played</h3>
        <input type="text" id="uUid" placeholder="Paste User UID">
        <input type="number" id="uBal" placeholder="Main Balance (TK)">
        <input type="number" id="uPlayed" placeholder="Matches Played Count">
        <button class="btn" style="background:#00c2ff" onclick="updateUser()">Update Account</button>
    </div>

    <div class="card" style="border-top: 3px solid #ff4444;">
        <h3>🚀 Create Tournament</h3>
        <input type="number" id="mNo" placeholder="Match Number (Ex: 01)">
        <input type="text" id="mTitle" placeholder="Match Name">
        <select id="mType">
            <option>Solo</option><option>Duo</option><option>Squad</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="mEntry" placeholder="Entry (TK)">
            <input type="number" id="mKill" placeholder="Per Kill (TK)">
            <input type="number" id="mPrize" placeholder="Total Prize (TK)">
        </div>
        <label style="font-size:12px; color:var(--p);">Match Start Time:</label>
        <input type="datetime-local" id="mTime">
        <textarea id="mRules" rows="3" placeholder="Match Specific Rules..."></textarea>
        <button class="btn" onclick="postMatch()">Go Live</button>
    </div>

    <div class="card" style="border-top: 3px solid #a832ad;">
        <h3>💰 Payment Requests (Deposit/Withdraw)</h3>
        <div id="pList">Loading Requests...</div>
    </div>

    <div class="card">
        <h3>📋 Live Matches & Room Info</h3>
        <div id="mList">Loading Matches...</div>
    </div>

    <script>
        const conf = { databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function saveTheme() {
            db.ref('settings/theme').set({ color: document.getElementById('appTheme').value });
            alert("Theme Sync Success!");
        }

        function updateUser() {
            let uid = document.getElementById('uUid').value;
            let bal = document.getElementById('uBal').value;
            let played = document.getElementById('uPlayed').value;
            if(!uid) return alert("UID দিন!");
            db.ref('users/' + uid).update({ winning: parseInt(bal), played: parseInt(played) })
            .then(() => alert("User Stats Updated!"));
        }

        function postMatch() {
            const data = {
                matchNo: document.getElementById('mNo').value,
                name: document.getElementById('mTitle').value,
                mode: document.getElementById('mType').value,
                entry: document.getElementById('mEntry').value,
                perKill: document.getElementById('mKill').value,
                prize: document.getElementById('mPrize').value,
                startTime: document.getElementById('mTime').value,
                rules: document.getElementById('mRules').value,
                roomId: "Pending", roomPass: "Pending"
            };
            db.ref('matches').push(data).then(() => { alert("Match Published! ✅"); location.reload(); });
        }

        function updateRoom(id) {
            db.ref('matches/' + id).update({
                roomId: document.getElementById('rid_'+id).value,
                roomPass: document.getElementById('rps_'+id).value
            }).then(() => alert("Room ID/Pass Updated!"));
        }

        db.ref('payments').on('value', s => {
            let h = "";
            s.forEach(c => {
                let p = c.val();
                h += `<div class="item"><b>${p.type}</b>: ${p.amount}TK | ${p.number}<br>UID: ${p.uid}<br>
                <button class="btn" style="width:48%; font-size:10px; background:cyan; margin-top:5px;" onclick="approvePay('${p.uid}', ${p.amount}, '${p.type}', '${c.key}')">Approve</button>
                <button class="del-btn" onclick="db.ref('payments/${c.key}').remove()">Reject</button></div>`;
            });
            document.getElementById('pList').innerHTML = h || "No requests found.";
        });

        function approvePay(uid, amount, type, pid) {
            db.ref('users/' + uid).once('value', s => {
                let current = parseInt(s.val().winning || 0);
                let total = (type === 'Deposit') ? (current + amount) : (current - amount);
                db.ref('users/' + uid).update({ winning: total });
                db.ref('payments/' + pid).remove();
                alert("Payment Success & Balance Updated!");
            });
        }

        db.ref('matches').on('value', s => {
            let h = "";
            s.forEach(c => {
                let m = c.val();
                h += `<div class="item">
                    <button class="del-btn" onclick="deleteMatch('${c.key}')">DELETE</button>
                    <b>#${m.matchNo} ${m.name}</b><br><small>${m.startTime}</small>
                    <div class="room-area">
                        <input type="text" id="rid_${c.key}" placeholder="Room ID" value="${m.roomId}">
                        <input type="text" id="rps_${c.key}" placeholder="Room Pass" value="${m.roomPass}">
                        <button class="btn" style="background:gold; font-size:11px; padding:8px;" onclick="updateRoom('${c.key}')">Push ID/PASS</button>
                    </div>
                </div>`;
            });
            document.getElementById('mList').innerHTML = h || "No active matches.";
        });

        function deleteMatch(id) { if(confirm("ম্যাচটি ডিলিট করবেন?")) db.ref('matches/' + id).remove(); }
    </script>
</body>
</html>
