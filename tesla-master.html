<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Admin - Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff00; --b: #0a0a0a; --c: #1a1a1a; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; padding: 20px; }
        .tab-btn { padding: 10px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; border-radius: 5px; margin: 5px; }
        .tab-btn.active { background: var(--p); color: #000; font-weight: bold; }
        .sec { background: var(--c); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #333; display: none; }
        .sec.active { display: block; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; cursor: pointer; }
    </style>
</head>
<body>

    <h2>TESLA ADMIN PANEL</h2>

    <div style="text-align: center;">
        <button class="tab-btn active" onclick="showSec('slider', this)">Slider</button>
        <button class="tab-btn" onclick="showSec('match', this)">Match</button>
        <button class="tab-btn" onclick="showSec('result', this)">Result & Pay</button>
        <button class="tab-btn" onclick="showSec('withdraw', this)">Withdraws</button>
    </div>

    <div id="slider" class="sec active">
        <h3>Home Slider Control</h3>
        <p style="font-size: 11px; color: #888;">ইমেজের ডিরেক্ট লিঙ্ক দিন (যেমন: Imgbb লিঙ্ক)</p>
        <input id="slideUrl" type="text" placeholder="https://i.ibb.co/example.jpg">
        <button class="btn-action" onclick="addSlider()">ADD SLIDE IMAGE</button>
        <div id="slideList" style="margin-top: 20px;"></div>
    </div>

    <div id="result" class="sec">
        <h3>Publish Result & Pay</h3>
        <p style="font-size: 11px; color: #888;">UID দিবেন, টাকা মেইন ও উইনিং—দুই ব্যালেন্সেই যাবে।</p>
        <input id="resMatchNo" type="text" placeholder="Match No (#01)">
        <input id="targetUid" placeholder="Player Main UID">
        <div style="display: flex; gap: 10px;">
            <input id="targetKill" type="number" placeholder="Kills">
            <input id="winAmount" type="number" placeholder="Win TK (Total)">
        </div>
        <button class="btn-action" style="background: #ffcc00; color: #000;" onclick="sendWinMoney()">SEND MONEY & PUBLISH</button>
    </div>

    <div id="match" class="sec">
        <h3>Create Match</h3>
        <input id="mNo" type="text" placeholder="Match No">
        <select id="mMode">
            <option value="BR Solo">BR Solo</option>
            <option value="BR Duo">BR Duo</option>
            <option value="BR Squad">BR Squad</option>
            <option value="Clash Squad">Clash Squad</option>
            <option value="Lone Wolf 1vs1">Lone Wolf 1vs1</option>
            <option value="Lone Wolf 2vs2">Lone Wolf 2vs2</option>
        </select>
        <input id="mFee" type="number" placeholder="Entry Fee">
        <button class="btn-action" onclick="publishMatch()">PUBLISH</button>
    </div>

    <script>
        const firebaseConfig = { /* আপনার কনফিগ এখানে */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showSec(id, btn) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // স্লাইডার অ্যাড করা
        function addSlider() {
            const url = document.getElementById('slideUrl').value;
            if(!url) return;
            db.ref('settings/sliders').push(url).then(() => {
                Swal.fire("Success", "Slider Image Added!", "success");
                document.getElementById('slideUrl').value = "";
            });
        }

        // ডাবল ব্যালেন্স এবং কিলসহ রেজাল্ট পাঠানো
        async function sendWinMoney() {
            const uid = document.getElementById('targetUid').value;
            const kills = document.getElementById('targetKill').value || 0;
            const amount = parseInt(document.getElementById('winAmount').value);
            const mNo = document.getElementById('resMatchNo').value;

            if(!uid || !amount) return Swal.fire("Error", "Fill all fields", "error");

            db.ref('users/' + uid).once('value', s => {
                if(!s.exists()) return Swal.fire("Error", "User Not Found!", "error");
                
                const u = s.val();
                // মেইন এবং উইনিং দুই জায়গাতেই অ্যাড হবে
                db.ref('users/' + uid).update({
                    winning: (u.winning || 0) + amount,
                    deposit: (u.deposit || 0) + amount
                }).then(() => {
                    db.ref('results').push({
                        matchNo: mNo,
                        name: u.name,
                        kills: kills,
                        amount: amount,
                        time: Date.now()
                    });
                    Swal.fire("Done!", "Money added to both wallets & Kill saved!", "success");
                });
            });
        }
    </script>
</body>
</html>
