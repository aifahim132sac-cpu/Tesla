<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080808; color: #00ff00; padding: 15px; margin: 0; }
        .card { background: #121212; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        h3 { color: #fff; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; font-size: 16px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        .btn { background: #00ff00; color: #000; width: 100%; padding: 14px; font-weight: bold; border: none; cursor: pointer; border-radius: 10px; text-transform: uppercase; transition: 0.3s; }
        .item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 4px solid cyan; font-size: 13px; color: #eee; }
        .id-copy { color: cyan; cursor: pointer; background: #222; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:white;">TESLA <span style="color:#00ff00;">ADMIN PANEL</span></h2>

    <div class="card" style="border-top: 4px solid cyan;">
        <h3>🎨 Theme Settings</h3>
        <input type="color" id="appTheme" value="#00ff00">
        <button class="btn" style="background:cyan" onclick="saveTheme()">Apply Theme Color</button>
    </div>

    <div class="card" style="border-top: 4px solid #ff4444;">
        <h3>🚀 Post New Tournament</h3>
        <input type="number" id="mNo" placeholder="Match No (Ex: 01)">
        <input type="text" id="mTitle" placeholder="Tournament Name">
        <select id="mType">
            <option>BR Solo</option><option>BR Duo</option><option>BR Squad</option>
            <option>CS 4vs4</option><option>Lone Wolf 1vs1</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="text" id="mEntry" placeholder="Entry (TK)">
            <input type="text" id="mKill" placeholder="Per Kill (TK)">
            <input type="text" id="mPrize" placeholder="Prize (TK)">
        </div>
        <input type="number" id="mSlots" placeholder="Total Slots (Ex: 48)">
        <label style="font-size:12px; color:#888;">Match Start Time:</label>
        <input type="datetime-local" id="mStartTime">
        <textarea id="mRules" rows="3" placeholder="Match Specific Rules..."></textarea>
        <button class="btn" onclick="postMatch()">Publish To User App</button>
    </div>

    <div class="card" style="border-top: 4px solid gold;">
        <h3>🔑 Update Room & Rules</h3>
        <input type="text" id="targetId" placeholder="Paste Match ID here">
        <input type="text" id="rId" placeholder="Room ID">
        <input type="text" id="rPass" placeholder="Room Password">
        <textarea id="editRules" rows="2" placeholder="Edit Rules (Optional)"></textarea>
        <button class="btn" style="background:gold" onclick="updateMatch()">Push Updates</button>
    </div>

    <div class="card" style="border-top: 4px solid #a832ad;">
        <h3>💰 Payment Requests</h3>
        <div id="paymentList">Loading requests...</div>
    </div>

    <div class="card">
        <h3>📋 Active Matches ID List</h3>
        <div id="mIdList"></div>
    </div>

    <script>
        const conf = { databaseURL: "const conf = { databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app" };
" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        function saveTheme() { db.ref('settings/theme').set({ color: document.getElementById('appTheme').value }); alert("Theme Sync Success!"); }

        function postMatch() {
            db.ref('matches').push({
                matchNo: document.getElementById('mNo').value,
                name: document.getElementById('mTitle').value,
                mode: document.getElementById('mType').value,
                entry: document.getElementById('mEntry').value,
                perKill: document.getElementById('mKill').value,
                prize: document.getElementById('mPrize').value,
                totalSlots: document.getElementById('mSlots').value,
                startTime: document.getElementById('mStartTime').value,
                rules: document.getElementById('mRules').value,
                roomId: "", roomPass: ""
            });
            alert("Match is Live!");
        }

        function updateMatch() {
            let id = document.getElementById('targetId').value;
            let data = { roomId: document.getElementById('rId').value, roomPass: document.getElementById('rPass').value };
            if(document.getElementById('editRules').value) data.rules = document.getElementById('editRules').value;
            db.ref('matches/' + id).update(data);
            alert("Room/Rules Updated!");
        }

        db.ref('payments').on('value', snap => {
            let h = "";
            snap.forEach(c => {
                let p = c.val();
                h += `<div class="item"><b>${p.type}</b>: ${p.amount}TK | ${p.number}<br>UID: ${p.uid}<br>
                <button class="btn" style="width:48%; font-size:10px; background:cyan; margin-top:5px;" onclick="approvePay('${p.uid}', ${p.amount}, '${p.type}', '${c.key}')">Approve</button>
                <button class="btn" style="width:48%; font-size:10px; background:red; color:white;" onclick="db.ref('payments/${c.key}').remove()">Reject</button></div>`;
            });
            document.getElementById('paymentList').innerHTML = h || "No requests found.";
        });

        function approvePay(uid, amount, type, pId) {
            db.ref('users/' + uid).once('value', s => {
                let cur = parseInt(s.val().winning || 0);
                let total = (type == 'Deposit') ? (cur + amount) : (cur - amount);
                db.ref('users/' + uid).update({ winning: total });
                db.ref('payments/' + pId).remove();
                alert("User Balance Updated Automatically!");
            });
        }

        db.ref('matches').on('value', s => {
            let h = ""; s.forEach(c => { h += `<div class="item">#${c.val().matchNo} | ID: <b class="id-copy" onclick="document.getElementById('targetId').value='${c.key}'">${c.key}</b></div>`; });
            document.getElementById('mIdList').innerHTML = h;
        });
    </script>
</body>
</html>
