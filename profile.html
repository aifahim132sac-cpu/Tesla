<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Profile</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 100px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 18px; }
        .p-section { text-align: center; padding: 20px 0; }
        .p-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 15px; }
        .s-box { background: var(--c); padding: 12px; border-radius: 12px; border: 1px solid #222; text-align: center; }
        .val-p { color: var(--p); display: block; font-weight: bold; }
        .form-sec { background: var(--c); padding: 20px; border-radius: 15px; margin: 15px; display: none; }
        .form-sec.active { display: block; }
        .submit-btn { width: 100%; padding: 12px; background: var(--p); color: #000; border: none; border-radius: 10px; font-weight: bold; }
        .logout { text-align: center; color: #ff3333; margin-top: 20px; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header"><div class="title">TESLA PROFILE</div></div>

    <div class="p-section">
        <img id="uPic" src="https://via.placeholder.com/100" class="p-img">
        <h3 id="displayName">User Name</h3>
        <small id="displayUid">UID: --------</small>
    </div>

    <div class="stats-grid">
        <div class="s-box">Winning<b class="val-p" id="uBal">0 TK</b></div>
        <div class="s-box">Played<b id="uPlayed">0</b></div>
        <div class="s-box">Deposit<b class="val-p" id="uDep">0 TK</b></div>
    </div>

    <div style="padding:0 15px; display:flex; gap:10px;">
        <button style="flex:1" onclick="toggleTab('dep')" id="btnDep" class="submit-btn">DEPOSIT</button>
        <button style="flex:1; background:#333; color:#fff;" onclick="toggleTab('wit')" id="btnWit" class="submit-btn">WITHDRAW</button>
    </div>

    <div id="depSec" class="form-sec active">
        <input type="number" id="depAmt" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Amount">
        <input type="file" id="depSS" style="margin-bottom:10px;">
        <button class="submit-btn" onclick="handleDeposit()">SEND DEPOSIT REQUEST</button>
    </div>

    <div id="witSec" class="form-sec">
        <input type="number" id="wAmt" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Amount">
        <input type="number" id="wNum" style="width:100%; padding:10px; margin-bottom:10px;" placeholder="Number">
        <button class="submit-btn" onclick="sendWitRequest()">SEND WITHDRAW REQUEST</button>
    </div>

    <div class="logout" onclick="auth.signOut().then(()=> window.location.href='index.html')">LOGOUT ACCOUNT</div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i active"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        auth.onAuthStateChanged(user => {
            if (user) { 
                document.getElementById('displayUid').innerText = "UID: " + user.uid.substring(0, 8).toUpperCase(); 
                db.ref('users/' + user.uid).on('value', s => {
                    let u = s.val() || {};
                    document.getElementById('displayName').innerText = u.name || "User";
                    document.getElementById('uBal').innerText = (u.winning || 0) + " TK";
                    document.getElementById('uDep').innerText = (u.deposit || 0) + " TK";
                    document.getElementById('uPlayed').innerText = u.playedCount || 0;
                });
            } else { window.location.href = "index.html"; }
        });

        function toggleTab(t) {
            document.getElementById('depSec').classList.toggle('active', t==='dep');
            document.getElementById('witSec').classList.toggle('active', t==='wit');
        }

        async function handleDeposit() {
            Swal.fire("Note", "Deposit system under maintenance", "info");
        }
        function sendWitRequest() {
            Swal.fire("Note", "Withdraw system under maintenance", "info");
        }
    </script>
</body>
</html>
