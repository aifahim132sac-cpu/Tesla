<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Profile</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --wa: #25d366; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 100px; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid var(--p); background: #000; position: relative; }
        .title { font-family: 'Orbitron'; color: var(--p); font-size: 18px; }
        .logout-btn { position: absolute; right: 20px; top: 22px; color: #ff4444; font-size: 20px; cursor: pointer; }

        .profile-wrap { position: relative; width: 110px; height: 110px; margin: 25px auto 10px; }
        #profileImg { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--p); background: #111; }
        .plus-btn { position: absolute; bottom: 5px; right: 5px; background: var(--p); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid #000; font-size: 16px; }

        .u-info { text-align: center; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 0 15px; }
        .s-box { background: var(--c); padding: 15px 5px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .s-box label { font-size: 9px; color: #777; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .val-p { color: var(--p); font-family: 'Orbitron'; font-size: 13px; }

        .action-btns { padding: 20px 15px; display: flex; gap: 12px; }
        .form-sec { background: var(--c); padding: 20px; border-radius: 20px; margin: 0 15px 20px; display: none; border: 1px solid #222; animation: fadeIn 0.4s; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .close-form { position: absolute; top: 15px; right: 15px; color: #ff4444; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .close-form:hover { transform: scale(1.2); }

        select, input { width: 100%; padding: 14px; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; margin-top: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        select:focus, input:focus { border-color: var(--p); }
        
        .btn-main { width: 100%; padding: 16px; background: var(--p); color: #000; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 5px; }
        
        .edit-name-icon { color: var(--p); margin-left: 8px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .edit-name-icon:hover { transform: scale(1.2); }

        /* উন্নত ও বড় হেল্পলাইন সেকশন */
        .helpline-box { 
            margin: 30px 15px; 
            padding: 25px; 
            background: linear-gradient(145deg, #0f0f0f, #1a1a1a); 
            border-radius: 25px; 
            border: 1px solid #333; 
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .wa-link { 
            color: var(--wa); 
            text-decoration: none; 
            font-weight: 700; 
            display: inline-flex; 
            align-items: center; 
            gap: 12px; 
            margin-top: 15px; 
            font-size: 22px; 
            font-family: 'Orbitron';
            background: rgba(37, 211, 102, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }
        .wa-link:active { transform: scale(0.9); background: rgba(37, 211, 102, 0.2); }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">MY ACCOUNT</div>
        <i class="fas fa-sign-out-alt logout-btn" onclick="handleLogout()"></i>
    </div>

    <div class="profile-wrap">
        <img id="profileImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
        <label for="imgInput" class="plus-btn"><i class="fas fa-plus"></i></label>
        <input type="file" id="imgInput" style="display:none" accept="image/*" onchange="uploadProfilePic(this)">
    </div>

    <div class="u-info">
        <div style="display: flex; align-items: center; justify-content: center;">
            <h3 id="userName" style="margin:0; font-family:'Orbitron';">Loading...</h3>
            <i class="fas fa-edit edit-name-icon" onclick="editUserName()"></i>
        </div>
        <p id="userUid" style="color:#555; font-size:11px; margin-top:5px; letter-spacing: 1px;">UID: ---</p>
    </div>

    <div class="stats-grid">
        <div class="s-box"><label>Main Balance</label><b class="val-p" id="balMain">0 TK</b></div>
        <div class="s-box"><label>Winning</label><b class="val-p" id="balWin" style="color:#ffcc00;">0 TK</b></div>
        <div class="s-box"><label>Total Played</label><b id="playedCount" style="font-family:'Orbitron'; font-size:13px;">0</b></div>
    </div>

    <div class="action-btns">
        <button style="flex:1" onclick="openTab('dep')" class="btn-main">DEPOSIT</button>
        <button style="flex:1; background:#222; color:#fff;" onclick="openTab('wit')" class="btn-main">WITHDRAW</button>
    </div>

    <div id="depForm" class="form-sec">
        <i class="fas fa-times-circle close-form" onclick="openTab('')"></i>
        <h4 style="margin:0 0 10px; color:var(--p);">Add Money</h4>
        <div id="adminNotice" style="font-size: 10px; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; color: #aaa; border: 1px solid #222;">
            অ্যাডমিন নাম্বার: <span id="adminPhone" style="color: var(--p);">...</span> (টাকা পাঠিয়ে নিচের তথ্য দিন)
        </div>
        <select id="dMethod">
            <option value="">Select Method</option>
            <option value="Bkash Personal">bKash Personal</option>
            <option value="Nagad Personal">Nagad Personal</option>
        </select>
        <input type="text" id="dSender" placeholder="Your Number (Sender)">
        <input type="number" id="dAmount" placeholder="Amount (TK)">
        <input type="text" id="dTrx" placeholder="Transaction ID (TrxID)">
        <button class="btn-main" onclick="submitDeposit()">SUBMIT REQUEST</button>
    </div>

    <div id="witForm" class="form-sec">
        <i class="fas fa-times-circle close-form" onclick="openTab('')"></i>
        <h4 style="margin:0 0 10px; color:#ffcc00;">Cash Out</h4>
        <select id="wMethod">
            <option value="">Select Method</option>
            <option value="Bkash Personal">bKash Personal</option>
            <option value="Nagad Personal">Nagad Personal</option>
        </select>
        <input type="text" id="wNumber" placeholder="Receiver Number">
        <input type="number" id="wAmount" placeholder="Amount (TK)">
        <button class="btn-main" style="background:#ffcc00" onclick="submitWithdraw()">SUBMIT REQUEST</button>
    </div>

    <div class="helpline-box">
        <p style="margin:0; font-size:16px; color:#bbb; font-weight: 600;">যেকোনো প্রয়োজনে যোগাযোগ করুন</p>
        <a href="https://wa.me/8801774774830" class="wa-link">
            <i class="fab fa-whatsapp" style="font-size: 30px;"></i> 01774774830
        </a>
        <p style="margin:15px 0 0; font-size:12px; color:#555; letter-spacing: 1px;">ধন্যবাদ আমাদের সাথে থাকার জন্য</p>
    </div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i active"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let currentUserData = {};

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const u = snap.val() || {};
                    currentUserData = u;
                    document.getElementById('userName').innerText = u.name || "Player";
                    document.getElementById('userUid').innerText = "UID: " + user.uid.toUpperCase().substring(0,14);
                    
                    document.getElementById('balMain').innerText = (u.balance || 0) + " TK";
                    document.getElementById('balWin').innerText = (u.winning || 0) + " TK";
                    document.getElementById('playedCount').innerText = u.played || 0;
                    
                    if(u.profilePic) {
                        document.getElementById('profileImg').src = u.profilePic;
                    }
                });
                
                db.ref('settings/adminNumber').on('value', s => {
                    document.getElementById('adminPhone').innerText = s.val() || "Check Admin Panel";
                });
            } else { window.location.href = "auth.html"; }
        });

        function editUserName() {
            Swal.fire({
                title: 'নাম পরিবর্তন করুন',
                input: 'text',
                inputValue: currentUserData.name || "",
                background: '#121212',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#00ff00',
                confirmButtonText: 'Update'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    db.ref('users/' + auth.currentUser.uid).update({
                        name: result.value
                    }).then(() => {
                        Swal.fire('Updated!', 'আপনার নাম আপডেট হয়েছে।', 'success');
                    });
                }
            });
        }

        // দ্রুত আপলোড ফাংশন
        async function uploadProfilePic(input) {
            const file = input.files[0];
            if(!file) return;

            // ছবির সাইজ চেক (৫ এমবির বেশি হলে সতর্কবার্তা)
            if (file.size > 5 * 1024 * 1024) {
                return Swal.fire("Error", "ছবি অনেক বড়! দয়া করে ছোট সাইজের ছবি দিন।", "error");
            }

            const apiKey = "bb6ae5282e75af49c1e446d17733e498"; 
            
            Swal.fire({ 
                title: 'Uploading...', 
                text: 'Fasten your seatbelt!',
                allowOutsideClick: false, 
                didOpen: () => Swal.showLoading() 
            });

            let formData = new FormData();
            formData.append("image", file);

            try {
                // সরাসরি হাই-স্পিড API কল
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    const url = data.data.url;
                    await db.ref('users/' + auth.currentUser.uid).update({ profilePic: url });
                    Swal.fire({
                        icon: 'success',
                        title: 'Done!',
                        text: 'প্রোফাইল পিকচার আপডেট হয়েছে।',
                        timer: 1500,
                        showConfirmButton: false
                    });
                } else {
                    throw new Error("Failed");
                }
            } catch(e) {
                Swal.fire("Error", "ছবি আপলোড করা যাচ্ছে না।", "error");
            }
        }

        function openTab(t) {
            const d = document.getElementById('depForm'), w = document.getElementById('witForm');
            d.style.display = 'none';
            w.style.display = 'none';
            if(t === 'dep') d.style.display = 'block';
            if(t === 'wit') w.style.display = 'block';
        }

        function submitDeposit() {
            const m = document.getElementById('dMethod').value;
            const s = document.getElementById('dSender').value;
            const a = parseFloat(document.getElementById('dAmount').value);
            const t = document.getElementById('dTrx').value;

            if(!m || !s || !a || !t) return Swal.fire("Error", "সবগুলো তথ্য দিন", "error");

            db.ref('payments').push({
                uid: auth.currentUser.uid,
                name: currentUserData.name || "Unknown",
                method: m,
                number: s,
                amount: a,
                trxId: t,
                type: "Deposit",
                status: "Pending",
                time: new Date().toLocaleString(),
                timestamp: Date.now()
            }).then(() => {
                Swal.fire("Success", "ডিপোজিট রিকোয়েস্ট পাঠানো হয়েছে।", "success");
                openTab('');
            });
        }

        function submitWithdraw() {
            const m = document.getElementById('wMethod').value;
            const n = document.getElementById('wNumber').value;
            const a = parseFloat(document.getElementById('wAmount').value);

            if(!m || !n || !a) return Swal.fire("Error", "সবগুলো তথ্য দিন", "error");

            const winBal = currentUserData.winning || 0;

            if (a > winBal) return Swal.fire("Error", "আপনার পর্যাপ্ত উইনিং ব্যালেন্স নেই!", "error");
            if (a < 50) return Swal.fire("Error", "সর্বনিম্ন ৫০ টাকা উইথড্র করা যাবে।", "error");

            db.ref('payments').push({
                uid: auth.currentUser.uid,
                name: currentUserData.name || "Unknown",
                method: m,
                number: n,
                amount: a,
                type: "Withdraw",
                status: "Pending",
                time: new Date().toLocaleString(),
                timestamp: Date.now()
            }).then(() => {
                Swal.fire("Success", "উইথড্র রিকোয়েস্ট পাঠানো হয়েছে।", "success");
                openTab('');
            });
        }

        function handleLogout() { auth.signOut().then(() => window.location.href = "auth.html"); }
    </script>
</body>
</html>
