<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Authentication</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .auth-box { 
            background: var(--c); padding: 35px 25px; border-radius: 20px; 
            border: 1px solid #222; width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .close-btn { 
            position: absolute; top: 15px; right: 20px; 
            font-size: 28px; color: #555; cursor: pointer; 
            transition: 0.3s; line-height: 1;
        }
        .close-btn:hover { color: #ff4444; }

        .tab-btn { background: none; border: none; color: #555; font-family: 'Orbitron'; cursor: pointer; padding: 10px; font-size: 14px; transition: 0.3s; }
        .tab-btn.active { color: var(--p); border-bottom: 2px solid var(--p); }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin-top: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--p); }
        
        .main-btn { width: 100%; padding: 15px; background: var(--p); color: #000; border: none; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .main-btn:active { transform: scale(0.98); }

        .forgot-pass { display: block; margin-top: 15px; font-size: 12px; color: #666; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .forgot-pass:hover { color: var(--p); }
    </style>
</head>
<body>

    <div class="auth-box">
        <span class="close-btn" onclick="goHome()">&times;</span>
        <h2 style="font-family: 'Orbitron'; color: var(--p); letter-spacing: 2px;">TESLA AUTH</h2>
        
        <div style="margin-bottom: 20px;">
            <button id="loginTab" class="tab-btn active" onclick="toggleAuth('login')">LOGIN</button>
            <button id="regTab" class="tab-btn" onclick="toggleAuth('reg')">REGISTER</button>
        </div>

        <div id="loginForm">
            <input type="email" id="lEmail" placeholder="Email Address">
            <input type="password" id="lPass" placeholder="Password">
            <button class="main-btn" id="loginBtn" onclick="handleLogin()">LET'S PLAY</button>
            <a class="forgot-pass" onclick="handleForgot()">Forgot Password?</a>
        </div>

        <div id="regForm" style="display: none;">
            <input type="text" id="rName" placeholder="Full Name">
            <input type="email" id="rEmail" placeholder="Email Address">
            <input type="password" id="rPass" placeholder="Password">
            <button class="main-btn" id="regBtn" onclick="handleReg()">CREATE ACCOUNT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        function goHome() { window.location.href = "index.html"; }

        function toggleAuth(type) {
            document.getElementById('loginForm').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('regForm').style.display = type === 'reg' ? 'block' : 'none';
            document.getElementById('loginTab').classList.toggle('active', type === 'login');
            document.getElementById('regTab').classList.toggle('active', type === 'reg');
        }

        function showLoading() {
            Swal.fire({
                title: 'Processing...',
                html: 'অনুগ্রহ করে অপেক্ষা করুন',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading() }
            });
        }

        function handleLogin() {
            const e = document.getElementById('lEmail').value.trim(), p = document.getElementById('lPass').value;
            if(!e || !p) return Swal.fire({ icon: 'warning', title: 'Oops!', text: 'Email এবং Password দিন', background: '#111', color: '#fff' });

            showLoading();
            auth.signInWithEmailAndPassword(e, p)
                .then(() => {
                    Swal.close();
                    window.location.href = "index.html"; 
                })
                .catch(err => {
                    Swal.fire({ icon: 'error', title: 'Login Failed', text: 'আপনার ইমেইল অথবা পাসওয়ার্ড ভুল।', background: '#111', color: '#fff' });
                });
        }

        function handleForgot() {
            const email = document.getElementById('lEmail').value.trim();
            if(!email) return Swal.fire({ icon: 'info', title: 'ইমেইল দিন', text: 'আপনার ইমেইলটি লিখে তারপর Forgot Password এ ক্লিক করুন।', background: '#111', color: '#fff' });

            auth.sendPasswordResetEmail(email)
                .then(() => {
                    Swal.fire({ icon: 'success', title: 'Email Sent!', text: 'পাসওয়ার্ড রিসেট লিঙ্ক আপনার ইমেইলে পাঠানো হয়েছে। স্প্যাম ফোল্ডারও চেক করবেন।', background: '#111', color: '#fff' });
                })
                .catch(err => Swal.fire({ icon: 'error', title: 'Failed', text: err.message, background: '#111', color: '#fff' }));
        }

        // --- রেজিস্ট্রেশন ফাংশন আপডেট করা হয়েছে ---
        function handleReg() {
            const n = document.getElementById('rName').value.trim(), e = document.getElementById('rEmail').value.trim(), p = document.getElementById('rPass').value;
            
            if(!n || !e || !p) return Swal.fire({ icon: 'warning', title: 'Oops!', text: 'সবগুলো ঘর পূরণ করুন', background: '#111', color: '#fff' });
            if(p.length < 6) return Swal.fire({ icon: 'warning', title: 'পাসওয়ার্ড দুর্বল', text: 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের দিন।', background: '#111', color: '#fff' });

            showLoading();
            auth.createUserWithEmailAndPassword(e, p).then(res => {
                // এখানে ডাটাবেজ স্ট্রাকচার একদম নিখুঁত করা হয়েছে
                const userData = { 
                    name: n, 
                    email: e, 
                    balance: 0,    // মেইন ব্যালেন্স
                    winning: 0,    // উইনিং ব্যালেন্স
                    played: 0,     // ম্যাচ খেলার সংখ্যা
                    uid: res.user.uid,
                    joinedMatches: {}, // এটি ব্ল্যাঙ্ক রাখা হয়েছে যেন ম্যাচ জয়েনিং এ সমস্যা না হয়
                    profilePic: "https://cdn-icons-png.flaticon.com/512/149/149071.png", // ডিফল্ট ছবি
                    status: "active", // ইউজারের স্ট্যাটাস
                    createdAt: new Date().toISOString() // একাউন্ট খোলার সময়
                };

                // ডাটাবেজে ডাটা পুশ করা হচ্ছে
                db.ref('users/' + res.user.uid).set(userData).then(() => {
                    Swal.close();
                    window.location.href = "index.html";
                });
            }).catch(err => {
                Swal.fire({ icon: 'error', title: 'Registration Failed', text: err.message, background: '#111', color: '#fff' });
            });
        }
    </script>
</body>
</html>
