<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - My Matches</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --y: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        .header { padding: 20px; background: #000; text-align: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 100; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 18px; }
        
        .my-card { background: var(--c); border-radius: 18px; padding: 18px; margin: 15px; border: 1px solid #222; animation: fadeIn 0.4s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .status-badge { font-size: 10px; background: rgba(0, 255, 0, 0.1); color: var(--p); padding: 4px 10px; border-radius: 50px; border: 1px solid var(--p); }
        
        .match-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .info-item { background: #000; padding: 10px; border-radius: 10px; border: 1px solid #222; font-size: 12px; }
        .info-item span { display: block; color: #777; font-size: 9px; text-transform: uppercase; }

        .details-box { background: #0a0a0a; border: 1px solid #333; border-radius: 12px; padding: 12px; margin: 15px 0; min-height: 40px; }
        .p-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
        .p-row:last-child { border: none; }
        
        .room-box { background: rgba(0, 255, 0, 0.03); border: 1px dashed var(--p); padding: 15px; border-radius: 12px; margin-top: 15px; text-align: center; }
        .r-val { background: #1a1a1a; padding: 12px; border-radius: 8px; font-size: 14px; color: var(--p); border: 1px solid #333; margin-top: 10px; font-family: 'Orbitron'; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { font-size: 16px; color: #777; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { color: var(--p); }

        .btn-rules { width: 100%; background: #222; color: #fff; border: none; padding: 10px; border-radius: 8px; font-family: 'Orbitron'; font-size: 11px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .btn-rules:hover { background: #333; }
        
        .countdown-timer { color: var(--y); font-family: 'Orbitron'; font-size: 11px; margin-left: 10px; font-weight: bold; }

        #no-match, #loading-state { text-align: center; padding: 100px 20px; color: #444; display: none; }
        #no-match i, #loading-state i { font-size: 50px; margin-bottom: 15px; color: var(--p); opacity: 0.5; }
        .spinner { border: 4px solid rgba(0, 255, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--p); margin: 0 auto 15px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 14px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header"><div class="title">MY MATCHES</div></div>
    
    <div id="loading-state" style="display: block;">
        <div class="spinner"></div>
        <p style="font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;">LOADING DATA...</p>
    </div>

    <div id="myList"></div>

    <div id="no-match">
        <i class="fas fa-trophy"></i>
        <p style="font-family: 'Orbitron'; letter-spacing: 1px;">NO MATCHES JOINED</p>
        <p style="font-size: 12px; color: #555;">আপনি এখনো কোনো ম্যাচে জয়েন করেননি।</p>
    </div>

    <nav class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i active"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.database();

        let timerIntervals = [];

        auth.onAuthStateChanged(user => { 
            if (user) { loadMyMatches(user.uid); } 
            else { window.location.href = "auth.html"; } 
        });

        function loadMyMatches(uid) {
            const listArea = document.getElementById('myList');
            const noMatchArea = document.getElementById('no-match');
            const loadingArea = document.getElementById('loading-state');

            db.ref('users/' + uid + '/joinedMatches').on('value', (userSnap) => {
                loadingArea.style.display = "none"; // লোডিং শেষ
                
                if (!userSnap.exists()) {
                    listArea.innerHTML = "";
                    noMatchArea.style.display = "block"; // জয়েন না থাকলে মেসেজ দেখাবে
                    return;
                }

                noMatchArea.style.display = "none";
                const joinedIds = Object.keys(userSnap.val());

                db.ref('matches').on('value', (snap) => {
                    const allMatches = snap.val();
                    if(!allMatches) return;

                    // আগের সব টাইমার বন্ধ করা
                    timerIntervals.forEach(clearInterval);
                    timerIntervals = [];

                    let h = "";
                    joinedIds.slice().reverse().forEach(id => {
                        const m = allMatches[id];
                        if (m) {
                            const rId = m.roomId || "";
                            const rPass = m.roomPass || "";
                            const isAvailable = (rId !== "" && rId !== "Updating..." && rPass !== "" && rPass !== "Updating...");
                            const timerId = `timer-${id}`;

                            h += `<div class="my-card">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span class="status-badge">JOINED</span>
                                    <span style="color:var(--p); font-family:Orbitron; font-size:11px;">#${m.matchNo}</span>
                                </div>
                                <h3 style="margin:12px 0 5px 0; font-size:17px;">${m.title}</h3>
                                <div style="font-size:11px; color:#aaa; display:flex; align-items:center;">
                                    <i class="far fa-clock"></i>&nbsp;${m.mTimeSelect ? m.mTimeSelect.replace('T', ' ') : 'TBA'} 
                                    <span class="countdown-timer" id="${timerId}"></span>
                                </div>

                                <div class="match-info-grid">
                                    <div class="info-item"><span>Entry Fee</span>৳${m.mFee}</div>
                                    <div class="info-item"><span>Type</span>${m.mType}</div>
                                </div>

                                <div id="details-${id}" class="details-box">লোডিং তথ্য...</div>

                                <button class="btn-rules" onclick="showRules('${m.mRules}')">VIEW RULES</button>

                                <div class="room-box">
                                    ${isAvailable ? 
                                        `<div style="font-size:11px; color:var(--p); margin-bottom:5px; font-family:Orbitron;">ROOM INFORMATION</div>
                                         <div class="r-val"><span>ID: ${rId}</span> <i class="far fa-copy copy-btn" onclick="copyText('${rId}')"></i></div>
                                         <div class="r-val"><span>PASS: ${rPass}</span> <i class="far fa-copy copy-btn" onclick="copyText('${rPass}')"></i></div>` 
                                        : `<div style="font-size:12px; color:var(--y); padding:10px;">
                                            <i class="fas fa-info-circle"></i><br>
                                            ম্যাচ শুরুর ১৫ মিনিট আগে এখানে রুম আইডি ও পাসওয়ার্ড দেওয়া হবে।
                                           </div>`
                                    }
                                </div>
                            </div>`;

                            if (m.mTimeSelect) startTimer(m.mTimeSelect, timerId);
                            setTimeout(() => fetchPlayerDetails(m.matchNo, uid, id), 100);
                        }
                    });
                    listArea.innerHTML = h;
                });
            });
        }

        function startTimer(targetTime, elementId) {
            const countDownDate = new Date(targetTime).getTime();
            const timerObj = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;
                const element = document.getElementById(elementId);
                
                if (!element) return;

                if (distance < 0) {
                    clearInterval(timerObj);
                    element.innerHTML = "MATCH STARTED";
                    element.style.color = "#ff4444";
                } else {
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                    element.innerHTML = `${hours}h ${minutes}m ${seconds}s`;
                }
            }, 1000);
            timerIntervals.push(timerObj);
        }

        function fetchPlayerDetails(matchNo, uid, divId) {
            db.ref('joinedPlayers/' + matchNo + '/' + uid).on('value', snap => {
                const data = snap.val();
                let dHtml = `<div style="color:var(--p); font-size:10px; margin-bottom:8px; font-family:Orbitron;">YOUR REGISTERED INFO</div>`;
                if(data && data.details) {
                    data.details.forEach((p, i) => {
                        dHtml += `<div class="p-row"><span>P${i+1}: ${p.name}</span><span>ID: ${p.gameId}</span></div>`;
                    });
                } else {
                    dHtml += `<div style="font-size:11px; color:#555;">প্লেয়ার ডাটা সিঙ্ক হচ্ছে...</div>`;
                }
                const target = document.getElementById('details-' + divId);
                if(target) target.innerHTML = dHtml;
            });
        }

        function showRules(rules) {
            Swal.fire({
                title: 'Match Rules',
                text: rules || "No rules specified.",
                icon: 'info',
                confirmButtonColor: '#00ff00',
                background: '#111', color: '#fff'
            });
        }

        function copyText(txt) {
            const tempInput = document.createElement('textarea');
            tempInput.value = txt;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copied!', showConfirmButton: false, timer: 1500, background: '#111', color: '#fff' });
        }
    </script>
</body>
</html>
