<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - My Matches</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; }
        .header { padding: 20px; background: #000; text-align: center; border-bottom: 2px solid var(--p); }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 18px; }
        
        .my-card { background: var(--c); border-radius: 15px; padding: 15px; margin: 15px; border: 1px solid #222; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .room-box { background: #000; border: 1px dashed var(--p); padding: 12px; border-radius: 10px; margin-top: 15px; text-align: center; }
        .r-val { background: #1a1a1a; padding: 10px; border-radius: 8px; font-size: 13px; color: var(--p); border: 1px solid #333; margin-top: 8px; font-family: 'Orbitron'; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { font-size: 14px; color: #777; cursor: pointer; transition: 0.3s; }
        .copy-btn:hover { color: var(--p); }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header"><div class="title">MY JOINED MATCHES</div></div>
    
    <div id="myList">
        <p style="text-align:center; padding:50px; color:#444;">ম্যাচ চেক করা হচ্ছে...</p>
    </div>

    <nav class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i active"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        const config = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(config);
        const auth = firebase.auth(), db = firebase.database();

        auth.onAuthStateChanged(user => { 
            if (user) { loadMyMatches(user.uid); } 
            else { window.location.href = "auth.html"; } 
        });

        async function loadMyMatches(uid) {
            // ইউজারের জয়েন করা ম্যাচের লিস্ট আগে নিয়ে আসা
            db.ref('users/' + uid + '/joinedMatches').on('value', async (userSnap) => {
                let h = "";
                if (!userSnap.exists()) {
                    document.getElementById('myList').innerHTML = `<div style="text-align:center; margin-top:80px;"><i class="fas fa-ghost" style="font-size:50px; color:#222;"></i><p style="color:#666; margin-top:15px;">আপনি এখনো কোনো ম্যাচে জয়েন করেননি।</p></div>`;
                    return;
                }

                const myMatches = userSnap.val(); // এটা মূলত ম্যাচ আইডি গুলোর অবজেক্ট
                const matchIds = Object.keys(myMatches);

                // সব ম্যাচ থেকে শুধু আমার জয়েন করা ম্যাচগুলো খুঁজে বের করা
                db.ref('matches').once('value', (snap) => {
                    const allMatches = snap.val();
                    if (!allMatches) return;

                    matchIds.forEach(id => {
                        // ডাটাবেজে যদি পুশ আইডি বা ম্যাচ আইডি কোনো একভাবে থাকে, সেটা চেক করা
                        let m = null;
                        if (allMatches[id]) {
                            m = allMatches[id];
                        } else {
                            // ম্যাচ নম্বর (Ex: 01) দিয়েও চেক করা হচ্ছে ব্যাকআপ হিসেবে
                            m = Object.values(allMatches).find(x => x.matchNo === id);
                        }

                        if (m) {
                            const roomId = m.roomId ? m.roomId.toString().trim() : "";
                            const roomPass = m.roomPass ? m.roomPass.toString().trim() : "";
                            
                            // যদি আইডি এবং পাস থাকে তবেই দেখানো হবে
                            const isReady = (roomId.length > 0 && roomId.toLowerCase() !== "pending" && roomId.toLowerCase() !== "tba");

                            h += `<div class="my-card">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="color:var(--p); font-family:Orbitron; font-size:10px;">MATCH #${m.matchNo || 'N/A'}</span>
                                    <span style="font-size:10px; color:#777; background:#222; padding:2px 8px; border-radius:4px;">${m.mType || 'SOLO'}</span>
                                </div>
                                <h3 style="margin:8px 0; font-size:16px;">${m.title}</h3>
                                <div style="font-size:11px; color:#aaa; margin-bottom:10px;">
                                    <i class="far fa-clock"></i> ${m.mTimeSelect ? m.mTimeSelect.replace('T', ' ') : 'TBA'}
                                </div>
                                <div class="room-box">
                                    ${isReady ? 
                                        `<div class="r-val"><span>Room ID: ${roomId}</span> <i class="far fa-copy copy-btn" onclick="copyText('${roomId}')"></i></div>
                                         <div class="r-val"><span>Pass: ${roomPass}</span> <i class="far fa-copy copy-btn" onclick="copyText('${roomPass}')"></i></div>` 
                                        : `<div style="font-size:12px; color:#ffcc00; padding:15px; line-height:1.6;">
                                            <i class="fas fa-clock" style="font-size:18px; margin-bottom:8px;"></i><br>
                                            ম্যাচ শুরুর ১০-১৫ মিনিট আগে আইডি এবং পাসওয়ার্ড এখানে দেওয়া হবে। একটু অপেক্ষা করুন।
                                           </div>`
                                    }
                                </div>
                            </div>`;
                        }
                    });
                    
                    if(h === "") {
                        document.getElementById('myList').innerHTML = `<div style="text-align:center; margin-top:80px;"><p style="color:#666;">ম্যাচ লোড করা সম্ভব হচ্ছে না।</p></div>`;
                    } else {
                        document.getElementById('myList').innerHTML = h;
                    }
                });
            });
        }

        function copyText(txt) {
            navigator.clipboard.writeText(txt).then(() => {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: 'Copied!',
                    showConfirmButton: false,
                    timer: 1500,
                    background: '#111',
                    color: '#fff'
                });
            });
        }
    </script>
</body>
</html>
