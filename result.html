<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --gold: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; }
        
        .header { padding: 25px; background: #000; text-align: center; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); margin: 0; font-size: 20px; text-shadow: 0 0 10px var(--p); }

        .container { padding: 15px; }

        /* রেজাল্ট কার্ড ডিজাইন */
        .res-card { background: var(--c); border-radius: 20px; padding: 15px; margin-bottom: 20px; border: 1px solid #1f1f1f; }
        .res-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .m-info b { display: block; color: var(--p); font-size: 16px; }
        .m-info span { font-size: 10px; color: #00ffff; border: 1px solid #00ffff; padding: 1px 5px; border-radius: 4px; text-transform: uppercase; }
        .res-date { font-size: 11px; color: #666; text-align: right; }

        /* টেবিল ডিজাইন (ডুও/স্কোয়াড সাপোর্ট) */
        .res-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
        .res-table th { background: #222; text-align: left; font-size: 10px; color: #888; padding: 10px; border-bottom: 1px solid #333; }
        .res-table td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid #222; color: #fff; }
        .win-amt { color: var(--p); font-weight: bold; }
        .kill-pt { color: var(--gold); }

        /* নেভিগেশন আইকন */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #666; font-size: 11px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header"><h2 class="title">MATCH RESULTS</h2></div>

    <div id="rList" class="container">
        <p style="text-align:center; color:#555;">রেজাল্ট লোড হচ্ছে...</p>
    </div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i><div>Play</div></a>
        <a href="result.html" class="n-i active"><i class="fas fa-chart-bar"></i><div>Result</div></a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i><div>My Match</div></a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i><div>Profile</div></a>
    </div>

    <script>
        // আপনার ফায়ারবেস কনফিগ
        const firebaseConfig = { 
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "742786792386", 
            appId: "1:742786792386:web:0c4daffc8b227a9ebf745b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('results').on('value', snap => {
            let html = "";
            let results = [];
            snap.forEach(c => { results.push({id: c.key, ...c.val()}); });
            results.reverse();

            results.forEach(r => {
                // প্লেয়ার লিস্ট হ্যান্ডলিং (Solo/Duo/Squad)
                let playersHtml = "";
                if(r.players && Array.isArray(r.players)) {
                    r.players.forEach(p => {
                        playersHtml += `
                        <tr>
                            <td>${p.name}</td>
                            <td class="kill-pt">${p.kills}</td>
                            <td class="win-amt">${p.prize} TK</td>
                        </tr>`;
                    });
                } else {
                    // সিঙ্গেল প্লেয়ার হলে (পুরাতন ডাটা সাপোর্ট)
                    playersHtml = `
                    <tr>
                        <td>${r.playerName || 'N/A'}</td>
                        <td class="kill-pt">${r.kills || 0}</td>
                        <td class="win-amt">${r.prize || 0} TK</td>
                    </tr>`;
                }

                html += `
                <div class="res-card">
                    <div class="res-top">
                        <div class="m-info">
                            <b>Match #${r.matchNo}</b>
                            <span>${r.matchType}</span>
                        </div>
                        <div class="res-date">${r.date}</div>
                    </div>
                    <table class="res-table">
                        <tr>
                            <th>PLAYER NAME</th>
                            <th>KILL</th>
                            <th>WINNING</th>
                        </tr>
                        ${playersHtml}
                    </table>
                </div>`;
            });
            
            document.getElementById('rList').innerHTML = html || "<p style='text-align:center; color:#555;'>No results published yet.</p>";
        });
    </script>
</body>
</html>
