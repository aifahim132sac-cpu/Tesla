<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --y: #ffcc00; --r: #ff4444; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header { padding: 20px; text-align: center; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 16px; letter-spacing: 2px; }
        
        /* দ্রুত লোডিং এনিমেশন */
        .res-card { background: var(--c); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #222; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .m-no { color: var(--p); font-family: 'Orbitron'; font-size: 11px; border: 1px solid var(--p); padding: 2px 8px; border-radius: 5px; }
        .m-time { font-size: 10px; color: #777; }

        .winner-section { background: rgba(0, 255, 0, 0.05); border-radius: 15px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(0, 255, 0, 0.1); }
        .section-tag { font-size: 10px; color: var(--y); font-family: 'Orbitron'; margin-bottom: 10px; display: block; text-align: center; }
        .winner-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .winner-row:last-child { border: none; }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .p-name { font-size: 13px; font-weight: 500; }
        .p-prize { color: var(--y); font-size: 12px; font-weight: bold; }

        .full-result-btn { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: #fff; font-size: 12px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .full-result-btn:active { transform: scale(0.98); background: #222; }

        .table-area { display: none; margin-top: 15px; overflow: hidden; border-radius: 10px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: #080808; }
        th { text-align: left; color: #555; padding: 12px 10px; border-bottom: 1px solid #222; font-size: 10px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; }
        .kill-badge { background: var(--r); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: bold; }

        /* No Result UI */
        #no-res { text-align: center; padding: 150px 20px; color: #444; display: none; }
        #no-res i { font-size: 50px; margin-bottom: 15px; color: #222; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header"><div class="title">MATCH RESULTS</div></div>
    
    <div id="rList"></div>

    <div id="no-res">
        <i class="fas fa-folder-open"></i>
        <p style="font-family: 'Orbitron'; letter-spacing: 1px;">NO RESULTS FOUND</p>
    </div>

    <nav class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i active"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // রিয়েল-টাইম এবং ফাস্ট লোডিং সিস্টেম
        db.ref('results').on('value', snap => {
            const listArea = document.getElementById('rList');
            const noResArea = document.getElementById('no-res');
            
            if(!snap.exists()) {
                listArea.innerHTML = "";
                noResArea.style.display = "block";
                return;
            }

            noResArea.style.display = "none";
            let htmlContent = "";
            let resultsArray = [];

            snap.forEach(child => {
                let val = child.val();
                val.key = child.key;
                resultsArray.push(val);
            });

            // সর্বশেষ রেজাল্ট সবার আগে দেখাবে
            resultsArray.reverse().forEach(r => {
                let winnersHtml = "";
                let playersTableHtml = "";
                
                // প্লেয়ার ডাটা থাকলে প্রসেস করবে
                if(r.players) {
                    const players = Array.isArray(r.players) ? r.players : Object.values(r.players);
                    
                    // পজিশন অনুযায়ী সাজানো
                    players.sort((a, b) => (parseInt(a.pos) || 99) - (parseInt(b.pos) || 99));

                    players.forEach(p => {
                        // Winner সেকশন: শুধু যারা উইনার বা পজিশন ১
                        if(p.type === 'Winner' || p.pos == 1) {
                            winnersHtml += `
                            <div class="winner-row">
                                <div class="p-info">
                                    <i class="fas fa-crown" style="color:var(--y);"></i>
                                    <span class="p-name">${p.name}</span>
                                </div>
                                <div class="p-prize">TK ${p.winning || 0}</div>
                            </div>`;
                        }

                        // টেবিল সেকশন: সব প্লেয়ার যারা ইনপুট করা হয়েছে
                        playersTableHtml += `
                        <tr>
                            <td><b>${p.pos || '-'}.</b> ${p.name}</td>
                            <td><span class="kill-badge">${p.kills || 0} KILLS</span></td>
                            <td style="color:var(--y); font-weight:600;">TK ${p.winning || 0}</td>
                        </tr>`;
                    });
                }

                // যদি প্লেয়ার ডাটা একদম না থাকে (খালি বক্স যেন না আসে)
                if(winnersHtml === "" && playersTableHtml === "") return;

                htmlContent += `
                <div class="res-card">
                    <div class="res-header">
                        <span class="m-no">MATCH #${r.matchId || '00'}</span>
                        <span class="m-time">${r.time ? new Date(r.time).toLocaleDateString() : 'FINISHED'}</span>
                    </div>
                    
                    <div style="text-align:center; margin-bottom:15px;">
                        <span style="font-size:13px; font-weight:600; color:#eee;">${r.matchTitle || 'OFFICIAL TOURNAMENT RESULT'}</span>
                    </div>

                    <div class="winner-section">
                        <span class="section-tag">WINNERS & CHAMPIONS</span>
                        ${winnersHtml}
                    </div>

                    <button class="full-result-btn" onclick="toggleTable('${r.key}')">
                        <i class="fas fa-list-ol" style="margin-right:8px;"></i> VIEW FULL RESULT
                    </button>

                    <div class="table-area" id="table-${r.key}">
                        <table>
                            <thead>
                                <tr><th>PLAYER</th><th>KILLS</th><th>PRIZE</th></tr>
                            </thead>
                            <tbody>
                                ${playersTableHtml}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            });

            listArea.innerHTML = htmlContent;
        });

        // টেবিল ওপেন/ক্লোজ ফাংশন
        function toggleTable(key) {
            const el = document.getElementById('table-'+key);
            const btn = el.previousElementSibling;
            if(el.style.display === 'block') {
                el.style.display = 'none';
                btn.style.background = "#1a1a1a";
                btn.innerHTML = '<i class="fas fa-list-ol" style="margin-right:8px;"></i> VIEW FULL RESULT';
            } else {
                el.style.display = 'block';
                btn.style.background = "#222";
                btn.innerHTML = '<i class="fas fa-times" style="margin-right:8px;"></i> CLOSE RESULT';
            }
        }
    </script>
</body>
</html>
