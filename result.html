<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --y: #ffcc00; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; }
        
        /* Header Style */
        .header { padding: 20px; text-align: center; background: #000; border-bottom: 2px solid var(--p); }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 18px; letter-spacing: 2px; }
        
        /* Card Style */
        .res-card { background: var(--c); border-radius: 18px; padding: 18px; margin: 15px; border: 1px solid #222; animation: fadeIn 0.6s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .res-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 12px; }
        .m-no { color: var(--p); font-family: 'Orbitron'; font-size: 12px; }
        .m-mode { background: #1a1a1a; padding: 3px 10px; border-radius: 5px; font-size: 10px; color: #aaa; text-transform: uppercase; border: 1px solid #333; }
        
        /* Winner Section */
        .winner-box { background: rgba(0, 255, 0, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 15px; }
        .winner-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
        .winner-row:last-child { border: none; }
        
        .label { font-size: 10px; color: #777; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .name { font-size: 14px; font-weight: 600; color: #fff; flex: 1; margin-left: 15px; }
        .prize { font-size: 12px; color: var(--y); font-family: 'Orbitron'; font-weight: bold; }
        
        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="header"><div class="title">TOURNAMENT RESULTS</div></div>
    
    <div id="rList">
        <p style="text-align:center; padding:50px; color:#444; font-size: 13px;">নতুন ফলাফল লোড হচ্ছে...</p>
    </div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i active"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </div>

    <script>
        // আপনার নতুন আপডেট করা API Key
        const firebaseConfig = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('results').on('value', snap => {
            let h = ""; 
            if(!snap.exists()) { 
                document.getElementById('rList').innerHTML = "<div style='text-align:center; padding:100px 20px; color:#555;'><h3>No Results!</h3><p>এখনো কোনো ম্যাচের ফলাফল দেওয়া হয়নি।</p></div>"; 
                return; 
            }
            
            let resultData = [];
            snap.forEach(c => { 
                let data = c.val();
                data.id = c.key; // কী সেভ করে রাখছি
                resultData.push(data); 
            });
            
            // নতুন রেজাল্ট সবার উপরে দেখাবে
            resultData.reverse();

            resultData.forEach(r => {
                h += `
                <div class="res-card">
                    <div class="res-header">
                        <span class="m-no">MATCH #${r.matchNo || '00'}</span>
                        <span class="m-mode">${r.mode || 'SOLO'}</span>
                    </div>
                    <div style="font-size:16px; font-weight:600; margin-bottom:12px; color:var(--p); font-family: 'Orbitron';">${r.name || 'Tesla Battle'}</div>
                    <div class="winner-box">
                        <div class="winner-row">
                            <div class="label"><i class="fas fa-crown" style="color:var(--y)"></i> WINNER</div>
                            <div class="name">${r.winner || '---'}</div>
                            <div class="prize">${r.winPrize || 0} TK</div>
                        </div>
                        <div class="winner-row">
                            <div class="label"><i class="fas fa-medal" style="color:#C0C0C0"></i> 2ND PLACE</div>
                            <div class="name">${r.runnerUp || '---'}</div>
                            <div class="prize">${r.runnerPrize || 0} TK</div>
                        </div>
                        <div class="winner-row">
                            <div class="label"><i class="fas fa-skull" style="color:#ff4444"></i> TOTAL KILLS</div>
                            <div class="name">${r.totalKills || 0} Kills</div>
                            <div class="prize" style="color:#fff">${r.killPrize || 0} TK</div>
                        </div>
                    </div>
                </div>`;
            }); 
            document.getElementById('rList').innerHTML = h;
        });
    </script>
</body>
</html>
