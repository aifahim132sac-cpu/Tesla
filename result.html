<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #1a1a1a; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 18px; text-shadow: 0 0 10px var(--p); }
        
        .res-container { padding: 15px; }
        .res-card { background: var(--c); border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #222; border-left: 4px solid var(--p); }
        .res-card b { display: block; font-size: 14px; margin-bottom: 5px; color: var(--p); }
        .res-card p { margin: 2px 0; font-size: 11px; color: #ccc; }
        .winner-tag { color: #ffcc00; font-weight: bold; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #666; font-size: 11px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 22px; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header"><div class="title">MATCH RESULTS</div></div>

    <div class="res-container" id="rList">
        <p style="text-align:center; color:#555;">রেজাল্ট লোড হচ্ছে...</p>
    </div>

    <div class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i><div>Play</div></a>
        <a href="result.html" class="n-i active"><i class="fas fa-chart-bar"></i><div>Result</div></a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i><div>My Match</div></a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i><div>Profile</div></a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE_X_rS-D8W_7_v9_J_3_X_0_O_8", 
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046",
            storageBucket: "teot-a3046.appspot.com",
            messagingSenderId: "305101036814",
            appId: "1:305101036814:web:658c16053f3e790f1352ac"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ডাটাবেস থেকে রেজাল্ট নিয়ে আসা
        db.ref('results').on('value', snap => {
            let html = "";
            if (!snap.exists()) {
                html = "<p style='text-align:center; color:#555;'>এখনো কোনো রেজাল্ট পাবলিশ হয়নি।</p>";
            } else {
                snap.forEach(child => {
                    let r = child.val();
                    html += `
                    <div class="res-card">
                        <b>Match #${r.matchNo} - ${r.mode}</b>
                        <p><span class="winner-tag">Winner:</span> ${r.winner}</p>
                        <p>Total Kills: ${r.kills || 0}</p>
                        <p>Prize Won: ${r.amount || 0} TK</p>
                    </div>`;
                });
            }
            document.getElementById('rList').innerHTML = html;
        });
    </script>
</body>
</html>
