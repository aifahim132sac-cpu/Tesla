<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Esports - Results</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00ff00; --b: #050505; --c: #121212; --y: #ffcc00; --r: #ff4444; }
        body { font-family: 'Poppins', sans-serif; background: var(--b); color: #fff; margin: 0; padding-bottom: 90px; }
        
        .header { padding: 20px; text-align: center; background: #000; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .title { font-family: 'Orbitron', sans-serif; color: var(--p); font-size: 16px; letter-spacing: 2px; }
        
        .res-card { background: var(--c); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid #222; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .m-no { color: var(--p); font-family: 'Orbitron'; font-size: 11px; border: 1px solid var(--p); padding: 2px 8px; border-radius: 5px; }
        .m-time { font-size: 10px; color: #555; }

        .winner-section { background: rgba(0, 255, 0, 0.05); border-radius: 15px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(0, 255, 0, 0.1); }
        .section-tag { font-size: 10px; color: var(--y); font-family: 'Orbitron'; margin-bottom: 10px; display: block; text-align: center; }
        .winner-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
        .winner-row:last-child { border: none; }
        .p-info { display: flex; align-items: center; gap: 10px; }
        .p-name { font-size: 13px; font-weight: 500; }
        .p-prize { color: var(--y); font-size: 12px; font-weight: bold; }

        .full-result-btn { width: 100%; padding: 10px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; color: #aaa; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .table-area { display: none; margin-top: 15px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #777; padding: 10px; border-bottom: 1px solid #222; font-weight: 500; }
        td { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; }
        .kill-badge { background: var(--r); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 10px; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 12px 0; border-top: 1px solid #1a1a1a; z-index: 1000; }
        .n-i { flex: 1; text-align: center; color: #555; font-size: 10px; text-decoration: none; }
        .n-i.active { color: var(--p); }
        .n-i i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header"><div class="title">MATCH RESULTS</div></div>
    
    <div id="rList">
        <div style="text-align:center; padding:100px 20px; color:#555;">ফলাফল লোড হচ্ছে...</div>
    </div>

    <nav class="nav">
        <a href="index.html" class="n-i"><i class="fas fa-gamepad"></i>Play</a>
        <a href="result.html" class="n-i active"><i class="fas fa-poll"></i>Result</a>
        <a href="mymatch.html" class="n-i"><i class="fas fa-trophy"></i>My Match</a>
        <a href="profile.html" class="n-i"><i class="fas fa-user-circle"></i>Profile</a>
    </nav>

    <script>
        const config = {
            apiKey: "AIzaSyDis0KmJK-GkQP-zoiotVWYDrfZug6v6nc",
            authDomain: "teot-a3046.firebaseapp.com",
            databaseURL: "https://teot-a3046-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "teot-a3046"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        db.ref('results').on('value', snap => {
            let h = ""; 
            if(!snap.exists()) {
                document.getElementById('rList').innerHTML = "<div style='text-align:center; padding:100px 20px; color:#555;'>No Results Yet!</div>";
                return;
            }
            
            let dataArr = [];
            snap.forEach(c => { 
                let val = c.val();
                val.key = c.key; 
                dataArr.push(val); 
            });
            dataArr.reverse(); // সর্বশেষ রেজাল্ট উপরে দেখাবে

            dataArr.forEach((r) => {
                let winnerListHtml = "";
                let fullResultHtml = "";

                if(r.players) {
                    // প্লেয়ারদের পজিশন অনুযায়ী সাজানো
                    const sortedPlayers = r.players.sort((a, b) => (parseInt(a.pos) || 99) - (parseInt(b.pos) || 99));

                    sortedPlayers.forEach(p => {
                        // উইনার কার্ডের জন্য লজিক
                        if(p.type === 'Winner') {
                            winnerListHtml += `
                            <div class="winner-row">
                                <div class="p-info">
                                    <i class="fas fa-crown" style="color:var(--y); font-size:12px;"></i>
                                    <span class="p-name">${p.name}</span>
                                </div>
                                <div class="p-prize">TK ${p.winning || 0}</div>
                            </div>`;
                        }
                        
                        // টেবিলের জন্য লজিক
                        fullResultHtml += `
                        <tr>
                            <td>${p.pos || '-'}. ${p.name}</td>
                            <td><span class="kill-badge">${p.kills || 0} KILLS</span></td>
                            <td style="color:var(--y)">TK ${p.winning || 0}</td>
                        </tr>`;
                    });
                }

                h += `
                <div class="res-card">
                    <div class="res-header">
                        <span class="m-no">MATCH #${r.matchId}</span>
                        <span class="m-time">${r.time ? new Date(r.time).toLocaleDateString() : ''}</span>
                    </div>
                    
                    <span style="font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 12px; display: block; text-align: center;">Official Tournament Result</span>

                    <div class="winner-section">
                        <span class="section-tag">WINNERS & CHAMPIONS</span>
                        ${winnerListHtml || '<p style="font-size:10px; text-align:center; color:#444;">No winners listed yet</p>'}
                    </div>

                    <button class="full-result-btn" onclick="toggleTable('${r.key}')">
                        <i class="fas fa-chevron-down"></i> View Full Result
                    </button>

                    <div class="table-area" id="table-${r.key}">
                        <table>
                            <thead>
                                <tr><th>POS. PLAYER</th><th>KILLS</th><th>WINNING</th></tr>
                            </thead>
                            <tbody>
                                ${fullResultHtml}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            });
            document.getElementById('rList').innerHTML = h;
        });

        function toggleTable(key) {
            const el = document.getElementById('table-'+key);
            const btn = el.previousElementSibling;
            if(el.style.display === 'block') {
                el.style.display = 'none';
                btn.innerHTML = '<i class="fas fa-chevron-down"></i> View Full Result';
            } else {
                el.style.display = 'block';
                btn.innerHTML = '<i class="fas fa-chevron-up"></i> Hide Full Result';
            }
        }
    </script>
</body>
</html>
